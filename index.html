<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aitu Викторины | 2000 ж. музыка</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo-area">
                <h1>Aitu <span>Викторины</span></h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Попытки</span>
                    <span class="stat-value" id="attempts">1</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Баллы</span>
                    <span class="stat-value" id="score">0</span>
                </div>
            </div>
        </header>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="tab-btn active" data-cat="all">Все</button>
            <button class="tab-btn" data-cat="new">Новое</button>
            <button class="tab-btn" data-cat="popular">Популярное</button>
        </div>

        <!-- Quiz Info Bar -->
        <div class="quiz-info-bar">
            <div class="progress-badge">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span id="current-q-num">1</span>/<span id="total-q-count">20</span>
            </div>
            <div class="timer-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span id="timer">30</span> сек
            </div>
        </div>

        <!-- Question Card -->
        <div class="question-card">
            <div class="question-header">
                <span class="question-number" id="question-index-badge">Вопрос 1 из 20</span>
            </div>
            <h2 class="question-text" id="question-text">Loading...</h2>
            <div class="options-list" id="options-container"></div>
            <button class="submit-btn" id="submitBtn">
                <span>Ответить</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="global-progress">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="global-progress-fill" style="width: 0%"></div>
            </div>
            <div class="progress-stats">
                <span>Пройдено: <strong id="answered-count">0</strong>/<span id="total-q-count2">20</span></span>
                <span id="accuracy-badge">Точность: 0%</span>
            </div>
        </div>

        <!-- Result Modal (аяқталғанда) -->
        <div class="modal" id="resultModal">
            <div class="modal-content">
                <div class="modal-icon">🏆</div>
                <h3>Викторина аяқталды!</h3>
                <p>Сіздің нәтижеңіз:</p>
                <div class="final-score" id="finalScore">0</div>
                <div class="final-details">
                    <span>✅ Дұрыс: <span id="correct-count">0</span></span>
                    <span>❌ Қате: <span id="wrong-count">0</span></span>
                </div>
                <button class="restart-btn" id="restartBtn">Қайта бастау</button>
            </div>
        </div>

        <footer>
            <p>Powered by Aitu</p>
        </footer>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
