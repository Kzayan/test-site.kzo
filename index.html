<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSIZ - Тест Платформасы</title>
    <!-- Face-API.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #10161d;
            --accent-red: #cc0000;
            --success-green: #00c853;
            --error-red: #ff3b3b;
            --border-color: #2a3340;
            --text-main: #eef2fb;
            --text-dim: #a0aab8;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; overflow-x: hidden; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Login Screen Styles */
        #login-screen, #test-screen, #result-screen { width: 100%; display: none; flex-direction: column; align-items: center; }
        #login-screen.active, #test-screen.active, #result-screen.active { display: flex; }

        .face-container { position: relative; width: 300px; height: 300px; border-radius: 50%; border: 4px solid var(--border-color); overflow: hidden; background: #000; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .preview-circle { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--accent-red); margin-top: 10px; display: none; object-fit: cover; }

        .input-group { margin: 20px 0; width: 100%; max-width: 300px; }
        input[type="password"] { width: 100%; padding: 15px; border-radius: 40px; border: 1px solid var(--border-color); background: var(--card-bg); color: white; text-align: center; font-size: 1.2rem; outline: none; transition: 0.3s; }
        input[type="password"]:focus { border-color: var(--accent-red); }

        .btn { padding: 15px 40px; border-radius: 40px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; text-transform: uppercase; }
        .btn-primary { background: var(--accent-red); color: white; }
        .btn-primary:disabled { background: #333; cursor: not-allowed; color: #777; }

        /* Test Styles */
        .progress-bar { width: 100%; background: var(--card-bg); height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-red); width: 0%; transition: 0.3s; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; font-weight: bold; }
        .stat-item.correct { color: var(--success-green); }
        .stat-item.wrong { color: var(--error-red); }

        .question-card { background: var(--card-bg); padding: 30px; border-radius: 28px; width: 100%; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .options-grid { display: grid; gap: 15px; width: 100%; }
        .option-btn { background: #151b23; border: 1px solid var(--border-color); color: white; padding: 15px 25px; border-radius: 15px; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .option-btn:hover { border-color: var(--text-dim); }
        .option-btn.correct { background: var(--success-green) !important; border-color: var(--success-green); }
        .option-btn.wrong { background: var(--error-red) !important; border-color: var(--error-red); }

        /* Admin Panel */
        #admin-trigger { position: fixed; bottom: 20px; right: 20px; color: #333; font-size: 12px; cursor: pointer; background: none; border: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 1000px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .admin-img { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent-red); border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 600px) {
            .question-card { padding: 20px; }
            .option-btn { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. КІРУ ЖҮЙЕСІ -->
    <section id="login-screen" class="active">
        <h1 style="color: var(--accent-red); margin-bottom: 5px;">UNSIZ</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Екі факторлы аутентификация</p>

        <div class="face-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        
        <div id="loading-models" style="margin-bottom: 15px;">
            <div class="loader"></div> Модельдер жүктелуде...
        </div>

        <img id="face-preview" class="preview-circle">

        <div class="input-group">
            <input type="password" id="login-pass" placeholder="Пароль енгізіңіз" maxlength="4">
            <p id="login-error" style="color: var(--error-red); font-size: 14px; text-align: center; display: none;">Қате пароль!</p>
        </div>

        <button id="entry-btn" class="btn btn-primary" disabled>Кіру</button>
    </section>

    <!-- 2. ТЕСТ ЖҮЙЕСІ -->
    <section id="test-screen">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="stats">
            <span>Сұрақ: <span id="q-current">1</span>/100</span>
            <span class="stat-item correct">✅ <span id="s-correct">0</span></span>
            <span class="stat-item wrong">❌ <span id="s-wrong">0</span></span>
        </div>
        <div class="question-card">
            <h2 id="question-text">Сұрақ жүктелуде...</h2>
        </div>
        <div class="options-grid" id="options-container"></div>
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button class="btn" style="background: #333; color: white;" onclick="finishTest()">Тестті аяқтау</button>
        </div>
    </section>

    <!-- 3. НӘТИЖЕ ЭКРАНЫ -->
    <section id="result-screen">
        <h1 style="font-size: 4rem; color: var(--accent-red); margin-bottom: 10px;" id="final-score">0</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">Сіздің жалпы ұпайыңыз</p>
        <div class="stats" style="font-size: 1.2rem;">
            <span class="stat-item correct">Дұрыс: <span id="f-correct">0</span></span>
            <span class="stat-item wrong">Қате: <span id="f-wrong">0</span></span>
        </div>
        <button class="btn btn-primary" style="margin-top: 40px;" onclick="location.reload()">Қайтадан бастау</button>
    </section>
</div>

<!-- АДМИН ПАНЕЛЬ -->
<button id="admin-trigger" onclick="openAdmin()">● АДМИН</button>

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Админ Панель</h2>
            <button class="btn" onclick="closeAdmin()" style="background: #333; color: white;">Жабу (Esc)</button>
        </div>
        <div style="margin: 20px 0;">
            <button class="btn" style="background: var(--error-red); color: white;" onclick="clearAllData()">БАРЛЫҒЫН ЖОЮ</button>
            <span style="margin-left: 20px;">Барлық нәтижелер: <span id="admin-total-count">0</span></span>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Бет</th>
                        <th>Дұрыс</th>
                        <th>Қате</th>
                        <th>Барлығы</th>
                        <th>Уақыты</th>
                        <th>Әрекет</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- ДЕРЕКТЕР (100 СҰРАҚ) ---
    const questions = [
        { q: "Синтаксистік қате (Syntax Error) дегеніміз не?", a: ["Код жазу ережелерінің бұзылуы", "Логикалық есептеудің қате болуы", "Программаның тым баяу жұмыс істеуі", "Айнымалының дұрыс жарияланбауы", "Сервермен байланыстың үзілуі"], c: 0 },
        { q: "Логикалық қате (Logic Error) қашан пайда болады?", a: ["Программа орындалады, бірақ нәтиже дұрыс емес", "Код компиляциядан өтпейді", "Жүйелік жад таусылғанда", "Файл табылмаған жағдайда", "Операторды қате жазғанда"], c: 0 },
        { q: "Debugging (жөндеу) терминінің мағынасы?", a: ["Қателерді іздеу және жою", "Кодты жаңа тілге аудару", "Бағдарламаны серверге жүктеу", "Дизайнды өзгерту", "Мәліметтер базасын құру"], c: 0 },
        { q: "Runtime Error (орындалу кезіндегі қате) мысалы:", a: ["Санды 0-ге бөлу", "Нүктелі үтірді ұмыту", "Жақшаны дұрыс жаппау", "Функция атын қате жазу", "Түсініктеме жазбау"], c: 0 },
        { q: "IDE-де қате астын қызылмен сызу нені білдіреді?", a: ["Синтаксистік қате", "Программа дайын", "Логикалық ескерту", "Фондық процесс", "Кодтың сұлулығы"], c: 0 }
    ];

    // Қалған 95 сұрақты автоматты түрде толтыру (мысал ретінде)
    for(let i = 6; i <= 100; i++) {
        questions.push({
            q: `Бағдарламалаудағы қателермен жұмыс сұрақ №${i}: Төмендегілердің қайсысы қате түріне жатады?`,
            a: ["Fatal Error", "Compilation Error", "Semantic Error", "Linker Error", "Барлық жауап дұрыс"],
            c: 4
        });
    }

    // --- АЙНЫМАЛЫЛАР ---
    let currentQ = 0;
    let score = { correct: 0, wrong: 0 };
    let capturedFace = null;
    let isFaceDetected = false;
    const STORAGE_KEY = 'unsiz_test_results_final';

    const video = document.getElementById('video');
    const loginPass = document.getElementById('login-pass');
    const entryBtn = document.getElementById('entry-btn');

    // --- FACE API БАСТАУ ---
    async function initFaceId() {
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            document.getElementById('loading-models').style.display = 'none';
            startVideo();
        } catch (e) {
            alert("Модельдерді жүктеу қатесі. Интернетті тексеріңіз.");
        }
    }

    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: {} })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Камераға рұқсат берілмеді!"));
    }

    video.addEventListener('play', () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.querySelector('.face-container').append(canvas);
        const displaySize = { width: video.width || 300, height: video.height || 300 };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
            if (detections.length > 0) {
                if (!isFaceDetected) {
                    captureFace();
                    isFaceDetected = true;
                }
            } else {
                isFaceDetected = false;
            }
            checkLoginRequirements();
        }, 500);
    });

    function captureFace() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        capturedFace = canvas.toDataURL('image/jpeg', 0.5);
        
        const preview = document.getElementById('face-preview');
        preview.src = capturedFace;
        preview.style.display = 'block';
    }

    function checkLoginRequirements() {
        const pass = loginPass.value;
        if (isFaceDetected && pass === "2510") {
            entryBtn.disabled = false;
        } else {
            entryBtn.disabled = true;
        }
    }

    loginPass.addEventListener('input', checkLoginRequirements);
    loginPass.addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && !entryBtn.disabled) startTest();
    });

    entryBtn.onclick = startTest;

    // --- ТЕСТ ЛОГИКАСЫ ---
    function startTest() {
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('test-screen').classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentQ];
        document.getElementById('q-current').innerText = currentQ + 1;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('progress-fill').style.width = `${(currentQ / 100) * 100}%`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        qData.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65 + index)}) ${opt}`;
            btn.onclick = () => handleAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(idx, btn) {
        const correctIdx = questions[currentQ].c;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (idx === correctIdx) {
            btn.classList.add('correct');
            score.correct++;
            document.getElementById('s-correct').innerText = score.correct;
        } else {
            btn.classList.add('wrong');
            allBtns[correctIdx].classList.add('correct');
            score.wrong++;
            document.getElementById('s-wrong').innerText = score.wrong;
        }

        setTimeout(() => {
            currentQ++;
            if (currentQ < 100) {
                renderQuestion();
            } else {
                finishTest();
            }
        }, 250);
    }

    function finishTest() {
        saveToStorage();
        document.getElementById('test-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').innerText = score.correct;
        document.getElementById('f-correct').innerText = score.correct;
        document.getElementById('f-wrong').innerText = score.wrong;
    }

    // --- САҚТАУ ЖҮЙЕСІ ---
    function saveToStorage() {
        const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const newData = {
            id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
            face: capturedFace,
            correct: score.correct,
            wrong: score.wrong,
            total: 100,
            date: new Date().toLocaleString('kk-KZ')
        };
        results.unshift(newData);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
    }

    // --- АДМИН ПАНЕЛЬ ЛОГИКАСЫ ---
    function openAdmin() {
        const pass = prompt("Админ құпия сөзін енгізіңіз:");
        if (pass === "7777") {
            document.getElementById('admin-modal').style.display = 'block';
            loadAdminData();
        } else if (pass !== null) {
            alert("Құпия сөз қате!");
        }
    }

    function closeAdmin() {
        document.getElementById('admin-modal').style.display = 'none';
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === "Escape") closeAdmin();
    });

    function loadAdminData() {
        const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const tbody = document.getElementById('admin-table-body');
        document.getElementById('admin-total-count').innerText = results.length;
        tbody.innerHTML = '';

        results.forEach((res, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><img src="${res.face}" class="admin-img" onclick="showFullImg('${res.face}')"></td>
                <td style="color: var(--success-green); font-weight:bold">${res.correct}</td>
                <td style="color: var(--error-red)">${res.wrong}</td>
                <td>${res.total}</td>
                <td style="font-size: 12px">${res.date}</td>
                <td><button onclick="deleteResult('${res.id}')" style="color: var(--error-red); background:none; border:none; cursor:pointer">ЖОЮ</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteResult(id) {
        if(confirm("Бұл нәтижені жоюды растайсыз ба?")) {
            let results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            results = results.filter(r => r.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
            loadAdminData();
        }
    }

    function clearAllData() {
        if(confirm("БАРЛЫҚ деректерді өшіруді растайсыз ба?") && confirm("Шынмен бе?")) {
            localStorage.removeItem(STORAGE_KEY);
            loadAdminData();
        }
    }

    function showFullImg(src) {
        const win = window.open("");
        win.document.write(`<img src="${src}" style="width:100%">`);
    }

    // Инициализация
    window.onload = initFaceId;

</script>

</body>
</html>
