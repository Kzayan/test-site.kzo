<script>
(function(){
  "use strict";

  function badKey(e){
    const k = (e.key || "").toUpperCase();
    if (
      e.key === "F12" ||
      (e.ctrlKey && k === "U") ||
      (e.ctrlKey && k === "S") ||
      (e.ctrlKey && k === "P") ||
      (e.ctrlKey && k === "C" && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) ||
      (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k))
    ) {
      e.preventDefault();
      e.stopPropagation();
      alert("Бұл сайт қорғалған!");
      return false;
    }
  }

  document.addEventListener("contextmenu", e => e.preventDefault(), true);
  document.addEventListener("selectstart", e => {
    if (!["INPUT","TEXTAREA"].includes((e.target.tagName || "").toUpperCase())) {
      e.preventDefault();
    }
  }, true);
  document.addEventListener("copy", e => {
    if (!["INPUT","TEXTAREA"].includes((e.target.tagName || "").toUpperCase())) {
      e.preventDefault();
    }
  }, true);
  document.addEventListener("cut", e => e.preventDefault(), true);
  document.addEventListener("keydown", badKey, true);

  function guard(open) {
    let el = document.getElementById("devGuard");
    if (!el) {
      el = document.createElement("div");
      el.id = "devGuard";
      el.innerHTML = "<div><b>Сайт қорғалған</b><br><small>Developer tools жабылғаннан кейін жалғастырыңыз.</small></div>";
      document.documentElement.appendChild(el);
    }
    el.style.display = open ? "flex" : "none";
  }

  setInterval(function(){
    const opened = Math.abs(window.outerWidth - window.innerWidth) > 180 ||
                   Math.abs(window.outerHeight - window.innerHeight) > 180;
    guard(opened);
  }, 900);
})();
</script>

<script>
(function(){
"use strict";

const LOGIN_PASSWORD = "2510";
const ADMIN_PASS = "7777";
const STORE = "unsiz_red_protected_results_v2";
const ROOMS_STORE = "unsiz_competition_rooms";

// ========== 100 СҰРАҚ (қысқартылған, бірақ толық нұсқа) ==========
const Q = [];
for(let i=1; i<=100; i++) {
  if(i<=10) Q.push(["Бағдарламалаудағы қателердің негізгі түрі?",["Синтаксистік","Логикалық","Runtime","Барлығы"],3]);
  else if(i<=20) Q.push(["Debugging дегеніміз не?",["Қате іздеу","Код жазу","Тестілеу","Компиляция"],0]);
  else if(i<=30) Q.push(["try-catch блогы не үшін қолданылады?",["Қате өңдеу","Цикл","Шарт","Функция"],0]);
  else if(i<=40) Q.push(["Null мәні нені білдіреді?",["Бос мән","Нөл","Қате","Анықталмаған"],0]);
  else if(i<=50) Q.push(["IDE дегеніміз не?",["Бағдарламалау ортасы","Операциялық жүйе","Дерекқор","Браузер"],0]);
  else if(i<=60) Q.push(["Syntax error дегеніміз?",["Жазылу қатесі","Логикалық қате","Есептеу қатесі","Желі қатесі"],0]);
  else if(i<=70) Q.push(["Runtime error қашан болады?",["Бағдарлама орындалу кезінде","Компиляция кезінде","Код жазу кезінде","Орнату кезінде"],0]);
  else if(i<=80) Q.push(["Unit test не тексереді?",["Бір модульді","Бүкіл жүйені","Интерфейсті","Дерекқорды"],0]);
  else if(i<=90) Q.push(["Refactoring дегеніміз?",["Кодты жақсарту","Кодты жою","Қате қосу","Файл өшіру"],0]);
  else Q.push(["Code review мақсаты?",["Қате табу","Кодты жасыру","Жылдамдықты арттыру","Дизайн жасау"],0]);
}
// Нақты жауап индекстерін орнату
for(let i=0; i<Q.length; i++) {
  if(Q[i][2] === undefined) Q[i][2] = 0;
}

// === ЖАРЫС ЖҮЙЕСІ ===
let currentRoom = null;
let currentUserName = null;

// Бөлме құру
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
  let code = '';
  for(let i=0; i<6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function createRoom() {
  const code = generateRoomCode();
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  rooms[code] = {
    createdAt: new Date().toISOString(),
    participants: [],
    host: currentUserName || "Аноним"
  };
  localStorage.setItem(ROOMS_STORE, JSON.stringify(rooms));
  currentRoom = code;
  localStorage.setItem("currentRoom", code);
  saveUserToRoom();
  showRoomModal(code);
  return code;
}

function joinRoom(code) {
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  if(!rooms[code]) {
    alert("Бөлме табылмады! Кодты тексеріңіз.");
    return false;
  }
  currentRoom = code;
  localStorage.setItem("currentRoom", code);
  saveUserToRoom();
  alert("✅ Бөлмеге қосылдыңыз! Енді тесті бастаңыз.");
  return true;
}

function saveUserToRoom() {
  if(!currentRoom) return;
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  if(rooms[currentRoom]) {
    const userId = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
    if(!rooms[currentRoom].participants.find(p => p.faceId === localStorage.getItem("userFaceId"))) {
      rooms[currentRoom].participants.push({
        id: userId,
        name: "Қатысушы " + (rooms[currentRoom].participants.length + 1),
        faceId: localStorage.getItem("userFaceId") || userId,
        correct: 0,
        wrong: 0,
        completed: false,
        joinedAt: new Date().toISOString()
      });
    }
    localStorage.setItem(ROOMS_STORE, JSON.stringify(rooms));
  }
}

function updateUserResult(correct, wrong) {
  if(!currentRoom) return;
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  const faceId = localStorage.getItem("userFaceId");
  if(rooms[currentRoom] && faceId) {
    const participant = rooms[currentRoom].participants.find(p => p.faceId === faceId);
    if(participant) {
      participant.correct = correct;
      participant.wrong = wrong;
      participant.completed = true;
      participant.completedAt = new Date().toISOString();
      localStorage.setItem(ROOMS_STORE, JSON.stringify(rooms));
    }
  }
}

function getLeaderboard() {
  if(!currentRoom) return [];
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  const room = rooms[currentRoom];
  if(!room) return [];
  return [...room.participants].sort((a,b) => b.correct - a.correct || a.wrong - b.wrong);
}

function showLeaderboard() {
  const leaderboard = getLeaderboard();
  const tbody = document.getElementById("leaderboardBody");
  if(!tbody) return;
  if(leaderboard.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Әзірге қатысушы жоқ</td></tr>';
    return;
  }
  tbody.innerHTML = leaderboard.map((p, idx) => {
    let rankClass = "";
    if(idx === 0) rankClass = "rank1";
    else if(idx === 1) rankClass = "rank2";
    else if(idx === 2) rankClass = "rank3";
    const percent = ((p.correct / 100) * 100).toFixed(1);
    return `<tr class="${rankClass}">
      <td>${idx + 1}</td>
      <td>${p.name}</td>
      <td style="color:#00c853">${p.correct}</td>
      <td style="color:#ff4141">${p.wrong}</td>
      <td>${percent}%</td>
    </tr>`;
  }).join("");
  document.getElementById("roomInfoDisplay").innerHTML = `<div class="room-code-badge">🏠 Бөлме коды: ${currentRoom}</div>
    <button id="copyRoomCodeBtn" class="share-btn copy-btn">📋 Кодты көшіру</button>`;
  const copyBtn = document.getElementById("copyRoomCodeBtn");
  if(copyBtn) copyBtn.onclick = () => { navigator.clipboard.writeText(currentRoom); alert("Бөлме коды көшірілді!"); };
}

      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  document.getElementById("copyLinkBtn").onclick = () => {
    const input = document.getElementById("shareLinkInput");
    input.select(); document.execCommand("copy");
    alert("Сілтеме көшірілді!");
  };
  document.getElementById("closeShareBtn").onclick = () => {
    document.getElementById("roomShareModal").remove();
    document.getElementById("leaderboardContainer").style.display = "block";
    showLeaderboard();
  };
}
