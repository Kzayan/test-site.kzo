<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title> | Барлық сілтемелер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="logo-area">
                <!-- Логотип орнына сурет немесе мәтін -->
                <div class="logo-icon">
                    <i class="fas fa-tv"></i>
                </div>
                <h1 class="channel-name">31 арна</h1>
                <p class="tagline">Сенімді ақпарат көзі</p>
            </div>
            
            <!-- Сілтемелер динамикалық түрде осы жерге толтырылады -->
            <div id="links-container" class="links-container">
                <!-- JS арқылы жүктеледі -->
                <div class="loading">Жүктелуде...</div>
            </div>

            <div class="social-footer">
                <p>Бізбен байланыс:</p>
                <div class="mini-icons">
                    <a href="#" id="contact-phone"><i class="fas fa-phone-alt"></i></a>
                    <a href="#" id="contact-email"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
