<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔐 DebugMaster Pro | Құпия тест</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a1a2f, #030b14);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .quiz-card {
            width: 100%;
            max-width: 900px;
            background: rgba(10, 28, 50, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 160, 255, 0.35);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(30, 120, 255, 0.2) inset, 0 0 30px #0050b330;
            padding: 28px 28px 20px;
            color: #e5f0ff;
            transition: box-shadow 0.3s;
        }

        .quiz-card:hover {
            box-shadow: 0 35px 55px #000000b0, 0 0 0 1.5px #3a8cff inset, 0 0 40px #1e6df080;
        }

        /* Пароль енгізу экраны */
        .password-screen {
            text-align: center;
            padding: 30px 20px;
        }

        .lock-icon {
            font-size: 5rem;
            color: #3a9cff;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #0088ff;
        }

        .password-screen h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #d9eeff;
        }

        .password-screen p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .password-input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 350px;
            margin: 0 auto;
        }

        .password-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 8px;
            background: #0d1f30;
            border: 2px solid #1e5480;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 4px 10px #00000060, 0 0 0 1px #1e4b7c;
        }

        .password-input:focus {
            border-color: #3f9aff;
            box-shadow: inset 0 4px 10px #00000080, 0 0 20px #0080ff, 0 0 0 2px #1e6df0;
        }

        .password-input::placeholder {
            letter-spacing: 2px;
            font-size: 1rem;
            opacity: 0.5;
        }

        .error-message {
            color: #ff7a7a;
            font-size: 1rem;
            min-height: 24px;
            text-shadow: 0 0 8px red;
        }

        .error-message i {
            margin-right: 6px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .question-counter {
            background: #0e233ac9;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            border: 1px solid #1f6599;
            box-shadow: inset 0 2px 5px #00000055, 0 6px 0 #0a151f;
            backdrop-filter: blur(8px);
            color: #c6e2ff;
        }

        .question-counter i {
            margin-right: 10px;
            color: #2a9dff;
        }

        .timer-block {
            background: #0b1e2f;
            padding: 10px 28px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 2.2rem;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #3079c7;
            box-shadow: 0 8px 0 #07121e, 0 8px 20px #0000006e, 0 0 15px #0088ff40;
            color: #f0f9ff;
            text-shadow: 0 0 10px #5ab0ff;
            transition: all 0.2s ease;
        }

        .timer-block i {
            font-size: 2rem;
            color: #52a5ff;
        }

        .timer-critical {
            color: #ffabab !important;
            text-shadow: 0 0 18px #ff3a3a !important;
            border-color: #e05a5a !important;
            box-shadow: 0 8px 0 #3e1515, 0 8px 20px #2f0000, 0 0 20px #ff5e5e !important;
            background: #1f1b2e;
        }

        .timer-critical i {
            color: #ff8a8a !important;
        }

        .question-box {
            background: #0d233bc2;
            border-radius: 36px;
            padding: 28px 26px;
            margin: 18px 0 28px;
            border: 1px solid #2667a7;
            box-shadow: inset 0 3px 8px #0000005e, 0 18px 25px -10px black;
            backdrop-filter: blur(5px);
        }

        .question-title {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #d9eeff;
            text-shadow: 0 2px 5px #00000050;
            word-break: break-word;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-item {
            background: #102c44e0;
            border: 1.5px solid #1e5480;
            border-radius: 60px;
            transition: all 0.18s ease;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 5px 0 #0a1823;
        }

        .answer-item:hover {
            transform: scale(1.01);
            background: #1b3f5e;
            border-color: #3f9aff;
            box-shadow: 0 0 15px #0077ff, 0 5px 0 #0a1823;
        }

        .answer-label {
            display: flex;
            align-items: center;
            padding: 16px 22px;
            gap: 16px;
            cursor: pointer;
            width: 100%;
        }

        .answer-label input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border: 2.5px solid #2f84cf;
            border-radius: 50%;
            background: #0a1a28;
            transition: 0.12s;
            box-shadow: inset 0 2px 5px black, 0 0 5px #1e90ff;
            cursor: pointer;
            flex-shrink: 0;
        }

        .answer-label input[type="radio"]:checked {
            background: #1e88e5;
            border-color: #a0d0ff;
            box-shadow: 0 0 18px #2a9dff, inset 0 1px 3px white;
        }

        .answer-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: #d1e7ff;
            word-break: break-word;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 10px;
        }

        .btn {
            background: linear-gradient(145deg, #1d4b74, #0f2b44);
            border: none;
            border-bottom: 5px solid #082233;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            padding: 16px 32px;
            border-radius: 80px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 0 #05121e, 0 5px 15px #00000070, 0 0 0 1px #2b74b3 inset;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
            border: 1px solid #1d72b8;
        }

        .btn i {
            font-size: 1.3rem;
            color: #8fcbff;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #05121e, 0 10px 25px black, 0 0 15px #0084ff, 0 0 0 1.5px #5aa9ff inset;
            background: #1f5580;
            border-color: #6eb2ff;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 #05121e, 0 8px 15px black, 0 0 0 1px #2d85d6 inset;
        }

        .btn:disabled {
            opacity: 0.45;
            transform: none;
            box-shadow: 0 5px 0 #05121e;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .unlock-btn {
            background: linear-gradient(145deg, #005cbb, #003d80);
            font-size: 1.5rem;
            padding: 16px 40px;
            box-shadow: 0 8px 0 #002856, 0 0 20px #0080ff;
            margin-top: 10px;
        }

        .result-panel {
            text-align: center;
            padding: 25px 15px;
        }

        .score-circle {
            font-size: 5rem;
            font-weight: 900;
            background: #102b44;
            display: inline-block;
            padding: 20px 50px;
            border-radius: 120px;
            margin: 25px 0;
            border: 2px solid #1e90ff;
            box-shadow: 0 0 40px #004cff40, inset 0 5px 10px black;
            color: #b3dcff;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 1.5rem;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 1.1rem;
            opacity: 0.85;
            color: #8fb7db;
            border-top: 1px dashed #2a6291;
            padding-top: 18px;
        }

        .footer i {
            color: #3f9eff;
            margin: 0 4px;
        }

        .hidden {
            display: none !important;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #3a6a9f;
            padding: 8px 16px;
            font-size: 0.9rem;
            box-shadow: none;
            margin-left: 10px;
        }

        .logout-btn:hover {
            background: #1a3a5c;
            box-shadow: 0 0 10px #ff5555;
            border-color: #ff7a7a;
        }

        @media (max-width: 550px) {
            .quiz-card { padding: 18px 14px; border-radius: 32px; }
            .question-title { font-size: 1.35rem; }
            .answer-text { font-size: 1rem; }
            .btn { padding: 14px 18px; font-size: 1.1rem; }
            .timer-block { font-size: 1.7rem; padding: 6px 16px; }
            .password-screen h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card" id="quizCard">
    <!-- Құпия сөз енгізу экраны -->
    <div id="passwordScreen" class="password-screen">
        <div class="lock-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h2>Құпия сөзді енгізіңіз</h2>
        <p>Тестке кіру үшін пароль қажет</p>
        <div class="password-input-wrapper">
            <input type="password" id="passwordInput" class="password-input" placeholder="****" maxlength="10" inputmode="numeric">
            <div id="passwordError" class="error-message"></div>
            <button class="btn unlock-btn" id="unlockBtn"><i class="fas fa-key"></i> Кіру</button>
        </div>
        <div style="margin-top: 30px; opacity: 0.5; font-size: 0.9rem;">
            <i class="fas fa-shield-alt"></i> Құпия сөзбен қорғалған
        </div>
    </div>

    <!-- Бастау экраны (пароль дұрыс болғанда көрінеді) -->
    <div id="startScreen" class="hidden">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
            <button class="btn logout-btn" id="logoutFromStartBtn"><i class="fas fa-sign-out-alt"></i> Шығу</button>
        </div>
        <div style="text-align: center; padding: 10px 0;">
            <div style="font-size: 3.5rem; margin-bottom: 10px;">🐞💻</div>
            <h1 style="font-size: 2.8rem; font-weight: 700; text-shadow: 0 0 15px #0099ff;">DEBUG QZ</h1>
            <p style="font-size: 1.3rem; margin: 20px 0;"><i class="fas fa-bug"></i> Қателерді табу шеберлігі <i class="fas fa-code"></i></p>
            <div style="background: #0a1e30; border-radius: 40px; padding: 20px; margin: 30px 0; border:1px solid #1c6196;">
                <p><i class="fas fa-question-circle"></i> 100 сұрақ • 30 минут</p>
                <p><i class="fas fa-check-circle" style="color:#4caf50;"></i> Әр дұрыс жауап = 1 балл</p>
            </div>
            <button class="btn start-btn" id="startTestBtn" style="font-size:1.8rem; padding:18px 45px;"><i class="fas fa-play"></i> ТЕСТТІ БАСТАУ</button>
        </div>
    </div>

    <!-- Тест аймағы -->
    <div id="quizArea" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <div></div>
            <button class="btn logout-btn" id="logoutFromQuizBtn"><i class="fas fa-sign-out-alt"></i> Шығу</button>
        </div>
        <div class="top-bar">
            <div class="question-counter"><i class="fas fa-list"></i> <span id="currentQDisplay">1</span>/<span id="totalQDisplay">100</span></div>
            <div class="timer-block" id="timerDisplay"><i class="far fa-clock"></i> <span id="timerValue">30:00</span></div>
        </div>
        <div class="question-box">
            <div class="question-title" id="questionText">Сұрақ жүктелуде...</div>
            <div class="answers-list" id="answersContainer"></div>
        </div>
        <div class="action-bar">
            <button class="btn" id="prevBtn" disabled><i class="fas fa-chevron-left"></i> Артқа</button>
            <button class="btn" id="nextBtn">Келесі <i class="fas fa-chevron-right"></i></button>
        </div>
        <div style="text-align:right; margin-top:5px;">
            <button class="btn" id="finishEarlyBtn" style="padding:12px 24px; font-size:1rem;"><i class="fas fa-flag-checkered"></i> Аяқтау</button>
        </div>
    </div>

    <!-- Нәтиже экраны -->
    <div id="resultScreen" class="hidden result-panel">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 5px;">
            <button class="btn logout-btn" id="logoutFromResultBtn"><i class="fas fa-sign-out-alt"></i> Шығу</button>
        </div>
        <i class="fas fa-trophy" style="font-size:4rem; color:#FFD966;"></i>
        <h2 style="font-size:2.5rem; margin:15px 0;">Нәтиже</h2>
        <div class="score-circle"><span id="finalScore">0</span> / 100</div>
        <div class="stats-grid">
            <div><i class="fas fa-check-circle" style="color:#4ade80;"></i> Дұрыс: <span id="correctCount">0</span></div>
            <div><i class="fas fa-times-circle" style="color:#f87171;"></i> Қате: <span id="wrongCount">0</span></div>
        </div>
        <button class="btn restart-btn" id="restartBtn"><i class="fas fa-rotate-right"></i> Қайта тапсыру</button>
    </div>

    <div class="footer">
        <i class="far fa-keyboard"></i> Жасаған — Аян KZ <i class="fas fa-terminal"></i>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ==================== ҚҰПИЯ СӨЗ ====================
        const CORRECT_PASSWORD = "7700";
        let isAuthenticated = false;

        // ==================== 100 СҰРАҚ ====================
        const questions = [
            { question: "Кодтағы қателерді анықтау процесі қалай аталады?", options: ["Компиляция", "Дебаггинг", "Тестілеу", "Орындау", "Инсталляция"], correct: 1 },
            { question: "Синтаксистік қате дегеніміз не?", options: ["Логикалық қате", "Бағдарлама баяу жұмыс істеуі", "Жазылу ережесінің бұзылуы", "Дерекқор қатесі", "Дизайн қатесі"], correct: 2 },
            { question: "Логикалық қате кезінде:", options: ["Бағдарлама мүлде ашылмайды", "Қате нәтиже береді", "Компьютер өшеді", "Файл жойылады", "Желі үзіледі"], correct: 1 },
            { question: "Runtime error қашан пайда болады?", options: ["Код жазу кезінде", "Компиляция кезінде", "Орындау кезінде", "Жобалау кезінде", "Орнату кезінде"], correct: 2 },
            { question: "Debugger не үшін керек?", options: ["Код жазу", "Қате іздеу", "Сурет салу", "Файл сақтау", "Интернетке шығу"], correct: 1 },
            { question: "print() функциясы не үшін қолданылады?", options: ["Қате жою", "Мәлімет шығару", "Файл ашу", "Желіге қосылу", "Код жою"], correct: 1 },
            { question: "try-except блогы не үшін керек?", options: ["Цикл құру", "Шарт жазу", "Қателерді өңдеу", "Айнымалы құру", "Файл жою"], correct: 2 },
            { question: "IDE дегеніміз:", options: ["Операциялық жүйе", "Бағдарламалау ортасы", "Вирус", "Драйвер", "Сервер"], correct: 1 },
            { question: "Infinite loop дегеніміз:", options: ["Бір рет орындалатын цикл", "Шексіз цикл", "Қате код", "Айнымалы", "Функция"], correct: 1 },
            { question: "Null мәні дегеніміз:", options: ["0 саны", "Бос мән", "1 саны", "Теріс сан", "Символ"], correct: 1 },
            { question: "Логикалық қатені табудың ең тиімді жолы:", options: ["Компьютерді өшіру", "Кодты қайта көшіру", "Қадамдап орындау (step-by-step)", "Интернетті тексеру", "Принтер қосу"], correct: 2 },
            { question: "Синтаксистік қате табылғанда:", options: ["Бағдарлама дұрыс жұмыс істейді", "Компиляция тоқтайды", "Нәтиже баяу шығады", "Файл ашылады", "Желі үзіледі"], correct: 1 },
            { question: "Айнымалы анықталмаса қандай қате шығады?", options: ["Type error", "Name error", "Index error", "Logic error", "Value error"], correct: 1 },
            { question: "Массив шегінен тыс элементке жүгінсек:", options: ["Name error", "Type error", "Index error", "Syntax error", "Key error"], correct: 2 },
            { question: "Type error қашан болады?", options: ["Қате атау жазылса", "Түрлер сәйкес келмесе", "Индекс дұрыс болмаса", "Цикл тоқтаса", "Файл жабылса"], correct: 1 },
            { question: "Қатені қайталамау үшін не істеу керек?", options: ["Кодты тестілеу", "Өшіру", "Компьютер ауыстыру", "Интернет қосу", "Бағдарламаны жасыру"], correct: 0 },
            { question: "assert командасы не үшін қолданылады?", options: ["Файл ашу", "Мәлімет басу", "Шартты тексеру", "Цикл жасау", "Айнымалы жою"], correct: 2 },
            { question: "Лог-файл не үшін керек?", options: ["Музыка сақтау", "Қате жазбаларын сақтау", "Видео көру", "Сурет салу", "Интернетке қосылу"], correct: 1 },
            { question: "Refactoring дегеніміз:", options: ["Кодты жою", "Код құрылымын жақсарту", "Қате қосу", "Файл форматтау", "Компьютер тазалау"], correct: 1 },
            { question: "Unit тестілеу не тексереді?", options: ["Бүкіл жүйені", "Бір модульді", "Серверді", "Интернетті", "Дизайнды"], correct: 1 },
            { question: "ValueError қашан пайда болады?", options: ["Айнымалы жоқ болса", "Мәлімет түрі сәйкес келмесе", "Дұрыс емес мән енгізілсе", "Индекс артық болса", "Файл табылмаса"], correct: 2 },
            { question: "FileNotFoundError қашан шығады?", options: ["Айнымалы жоқ болса", "Файл табылмаса", "Түр сәйкес келмесе", "Шарт қате болса", "Цикл тоқтаса"], correct: 1 },
            { question: "except блогы қай кезде орындалады?", options: ["Қате болмаса", "Қате пайда болса", "Әрқашан", "Цикл ішінде ғана", "Функция алдында"], correct: 1 },
            { question: "finally блогы:", options: ["Ешқашан орындалмайды", "Қате болса ғана орындалады", "Әрқашан орындалады", "Цикл жасайды", "Айнымалы құрады"], correct: 2 },
            { question: "Логикалық қателерді табу үшін:", options: ["Кодты талдау керек", "Компьютер ауыстыру керек", "Файлды жою керек", "Интернетті өшіру керек", "Принтер қосу керек"], correct: 0 },
            { question: "Breakpoint дегеніміз:", options: ["Қате түрі", "Бағдарламаны тоқтату нүктесі", "Айнымалы", "Цикл", "Файл"], correct: 1 },

        // ==================== DOM ELEMENTTER ====================
        const passwordScreen = document.getElementById('passwordScreen');
        const startScreen = document.getElementById('startScreen');
        const quizArea = document.getElementById('quizArea');
        const resultScreen = document.getElementById('resultScreen');
        
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const passwordError = document.getElementById('passwordError');
        
        const startTestBtn = document.getElementById('startTestBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const finishEarlyBtn = document.getElementById('finishEarlyBtn');

        const logoutFromQuizBtn = document.getElementById('logoutFromQuizBtn');
        const logoutFromResultBtn = document.getElementById('logoutFromResultBtn');
        
        const questionText = document.getElementById('questionText');
        const answersDiv = document.getElementById('answersContainer');
        const currentQSpan = document.getElementById('currentQDisplay');
        const totalQSpan = document.getElementById('totalQDisplay');
        const timerSpan = document.getElementById('timerValue');
        const timerBlock = document.getElementById('timerDisplay');
        
        const finalScoreSpan = document.getElementById('finalScore');
        const correctSpan = document.getElementById('correctCount');
        const wrongSpan = document.getElementById('wrongCount');

        // ==================== STATE ====================
        let currentIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let timerInterval = null;
        let timeLeft = 30 * 60;
        let testActive = false;
        let testFinished = false;

        // ==================== АУТЕНТИФИКАЦИЯ ====================
        function checkPassword() {
            const entered = passwordInput.value.trim();
            if (entered === CORRECT_PASSWORD) {
                isAuthenticated = true;
                passwordError.textContent = '';
                passwordInput.value = '';
                showStartScreen();
            } else {
                passwordError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Қате құпия сөз!';
                passwordInput.classList.add('error-shake');
                setTimeout(() => passwordInput.classList.remove('error-shake'), 300);
            }
        }

        function showStartScreen() {
            passwordScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            quizArea.classList.add('hidden');
            resultScreen.classList.add('hidden');
        }

        function logout() {
            isAuthenticated = false;
            testActive = false;
            testFinished = false;
            stopTimer();
            timeLeft = 30 * 60;
            currentIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            updateTimerUI();
            timerBlock.classList.remove('timer-critical');
            
            passwordScreen.classList.remove('hidden');
            startScreen.classList.add('hidden');
            quizArea.classList.add('hidden');
            resultScreen.classList.add('hidden');
            passwordInput.value = '';
            passwordError.textContent = '';
        }

        // ==================== ТАЙМЕР ====================
        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateTimerUI() {
            timerSpan.textContent = formatTime(timeLeft);
            if (timeLeft <= 300) {
                timerBlock.classList.add('timer-critical');
            } else {
                timerBlock.classList.remove('timer-critical');
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer() {
            stopTimer();
            timerInterval = setInterval(() => {
                if (!testActive || testFinished) return;
                if (timeLeft <= 1) {
                    timeLeft = 0;
                    updateTimerUI();
                    testActive = false;
                    testFinished = true;
                    stopTimer();
                    showResultScreen();
                } else {
                    timeLeft--;
                    updateTimerUI();
                }
            }, 1000);
        }

        // ==================== СҰРАҚ КӨРСЕТУ ====================
        function renderQuestion() {
            if (!testActive && !testFinished) return;
            const q = questions[currentIndex];
            questionText.textContent = q.question;
            
            let html = '';
            q.options.forEach((opt, idx) => {
                const checked = (userAnswers[currentIndex] === idx) ? 'checked' : '';
                html += `<div class="answer-item">
                    <label class="answer-label">
                        <input type="radio" name="answer" value="${idx}" ${checked}>
                        <span class="answer-text">${opt}</span>
                    </label>
                </div>`;
            });
            answersDiv.innerHTML = html;

            document.querySelectorAll('input[name="answer"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (!testActive || testFinished) return;
                    userAnswers[currentIndex] = parseInt(e.target.value, 10);
                });
            });

            currentQSpan.textContent = currentIndex + 1;
            totalQSpan.textContent = questions.length;
            
            prevBtn.disabled = (currentIndex === 0);
            if (currentIndex === questions.length - 1) {
                nextBtn.innerHTML = 'Аяқтау <i class="fas fa-check"></i>';
            } else {
                nextBtn.innerHTML = 'Келесі <i class="fas fa-chevron-right"></i>';
            }
        }

        function calculateScore() {
            let correct = 0;
            userAnswers.forEach((ans, i) => {
                if (ans === questions[i].correct) correct++;
            });
            return { correct, wrong: questions.length - correct };
        }

        function showResultScreen() {
            testActive = false;
            testFinished = true;
            stopTimer();
            quizArea.classList.add('hidden');
            startScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            const { correct, wrong } = calculateScore();
            finalScoreSpan.textContent = correct;
            correctSpan.textContent = correct;
            wrongSpan.textContent = wrong;
        }

        function resetAndStartQuiz() {
            testActive = false;
            testFinished = false;
            stopTimer();
            timeLeft = 30 * 60;
            currentIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            updateTimerUI();
            timerBlock.classList.remove('timer-critical');
            
            testActive = true;
            startScreen.classList.add('hidden');
            quizArea.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            renderQuestion();
            startTimer();
        }

        function goToNext() {
            if (!testActive || testFinished) return;
            const selected = document.querySelector('input[name="answer"]:checked');
            if (selected) {
                userAnswers[currentIndex] = parseInt(selected.value, 10);
            }
            
            if (currentIndex === questions.length - 1) {
                testActive = false;
                testFinished = true;
                stopTimer();
                showResultScreen();
            } else {
                currentIndex++;
                renderQuestion();
            }
        }

        function goToPrev() {
            if (!testActive || testFinished) return;
            const selected = document.querySelector('input[name="answer"]:checked');
            if (selected) {
                userAnswers[currentIndex] = parseInt(selected.value, 10);
            }
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // ==================== EVENT LISTENERS ====================
        unlockBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
        
        logoutFromStartBtn.addEventListener('click', logout);
        logoutFromQuizBtn.addEventListener('click', () => {
            if (confirm('Тесттен шығып, басынан бастайсыз ба?')) {
                logout();
            }
        });
        logoutFromResultBtn.addEventListener('click', logout);
        
        startTestBtn.addEventListener('click', resetAndStartQuiz);
        nextBtn.addEventListener('click', goToNext);
        prevBtn.addEventListener('click', goToPrev);
        
        finishEarlyBtn.addEventListener('click', () => {
            if (testActive && !testFinished) {
                if (confirm('Тестті мерзімінен бұрын аяқтайсыз ба?')) {
                    testActive = false;
                    testFinished = true;
                    stopTimer();
                    showResultScreen();
                }
            }
        });
        
        restartBtn.addEventListener('click', () => {
            testActive = false;
            testFinished = false;
            stopTimer();
            timeLeft = 30 * 60;
            currentIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            updateTimerUI();
            timerBlock.classList.remove('timer-critical');
            
            startScreen.classList.remove('hidden');
            quizArea.classList.add('hidden');
            resultScreen.classList.add('hidden');
        });

        // ==================== БАСТАПҚЫ ҚҰЛЫПТАУ ====================
        totalQSpan.textContent = questions.length;
        updateTimerUI();
        passwordScreen.classList.remove('hidden');
        startScreen.classList.add('hidden');
        quizArea.classList.add('hidden');
        resultScreen.classList.add('hidden');
    })();
</script>
</body>
</html>
