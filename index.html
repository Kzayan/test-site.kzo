<script>
    (function(){
        "use strict";
        
        // ========== ҚҰРЫЛҒЫ АНЫҚТАУ ==========
        function detectDeviceType() {
            const ua = navigator.userAgent;
            const width = window.innerWidth;
            let deviceType = 'desktop', deviceIcon = '💻', deviceClass = 'device-desktop';
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) {
                deviceType = 'tablet'; deviceIcon = '📱'; deviceClass = 'device-tablet';
            } else if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) {
                deviceType = 'mobile'; deviceIcon = '📱'; deviceClass = 'device-mobile';
            } else if (/(Macintosh|MacIntel|MacPPC|Mac68K|Mac OS X)/i.test(ua) && !/(iPhone|iPad|iPod)/i.test(ua)) {
                deviceType = 'laptop'; deviceIcon = '💻'; deviceClass = 'device-laptop';
            } else if (/(Win64|WOW64|Win32)/i.test(ua)) {
                deviceType = 'desktop'; deviceIcon = '🖥️'; deviceClass = 'device-desktop';
            }
            if (width <= 480) { deviceType = 'mobile'; deviceIcon = '📱'; deviceClass = 'device-mobile'; }
            else if (width <= 768) { deviceType = 'tablet'; deviceIcon = '📱'; deviceClass = 'device-tablet'; }
            return { deviceType, deviceIcon, deviceClass };
        }
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Edg/')) return 'Edge';
            if (ua.includes('OPR/') || ua.includes('Opera')) return 'Opera';
            if (ua.includes('Chrome/')) return 'Chrome';
            if (ua.includes('Safari/') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Firefox/')) return 'Firefox';
            return 'Белгісіз';
        }
        function getOSInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Windows NT 10.0')) return 'Windows 10/11';
            if (ua.includes('Windows')) return 'Windows';
            if (ua.includes('Mac OS X')) return 'macOS';
            if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
            if (ua.includes('Android')) return 'Android';
            if (ua.includes('Linux')) return 'Linux';
            return 'Белгісіз';
        }
        function getDetailedDeviceInfo() {
            const device = detectDeviceType();
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            return {
                type: device.deviceType, typeIcon: device.deviceIcon, typeClass: device.deviceClass,
                browser, os, screen: screenRes,
                fullInfo: `${device.deviceIcon} ${device.deviceType} | ${browser} | ${os} | ${screenRes}`
            };
        }
        
        // ========== 100 СҰРАҚ (ҚЫСҚАРТЫЛҒАН) ==========
        const ORIGINAL_QUESTIONS = [
            { q: "Кодтағы қателерді анықтау процесі қалай аталады?", options: ["Компиляция", "Дебаггинг", "Тестілеу", "Орындау", "Инсталляция"], correct: 1 },
            { q: "Синтаксистік қате дегеніміз не?", options: ["Логикалық қате", "Бағдарлама баяу жұмыс істеуі", "Жазылу ережесінің бұзылуы", "Дерекқор қатесі", "Дизайн қатесі"], correct: 2 },
            // ... қалған сұрақтар (100 сұрақ толық болуы керек)
        ];
        while (ORIGINAL_QUESTIONS.length < 100) {
            ORIGINAL_QUESTIONS.push({ q: `Тест сұрағы ${ORIGINAL_QUESTIONS.length+1}`, options: ["A", "B", "C", "D", "E"], correct: 0 });
        }
        const TOTAL_QUESTIONS = 100;
        
        function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
        function shuffleQuestionOptions(question) {
            const opts = question.options.map((opt, idx) => ({ opt, originalIndex: idx }));
            const shuffled = shuffleArray([...opts]);
            const newCorrect = shuffled.findIndex(item => item.originalIndex === question.correct);
            return { q: question.q, options: shuffled.map(item => item.opt), correct: newCorrect };

            try {

                }});

                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });

                palmStatus.className = 'palm-status error';
                return false;
            }

        // ========== LIVENESS DETECTION (MEDIAPIPE) ==========
        function startLivenessDetection() {
            movementScore = 0;
            livenessPassed = false;
            lastHandPosition = null;
            movementBar.style.width = '0%';
            livenessHint.textContent = '✋ Алақаныңызды баяу қозғалтыңыз...';
            livenessHint.style.color = '#ffaa00';
            
            if (livenessCheckInterval) clearInterval(livenessCheckInterval);
            
            livenessCheckInterval = setInterval(async () => {
                if (!handsModel || !palmStream || palmVideo.readyState < 2) return;
                
                try {
                    const results = await handsModel.send({image: palmVideo});
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        const hand = results.multiHandLandmarks[0];
                        // Ортаңғы нүкте (алақан ортасы)
                        const wrist = hand[0];
                        const middleFinger = hand[12];
                        const centerX = (wrist.x + middleFinger.x) / 2 * palmVideo.videoWidth;
                        const centerY = (wrist.y + middleFinger.y) / 2 * palmVideo.videoHeight;
                        
                        if (lastHandPosition) {
                            const distance = Math.sqrt(
                                Math.pow(centerX - lastHandPosition.x, 2) + 
                                Math.pow(centerY - lastHandPosition.y, 2)
                            );
                            if (distance > 15 && distance < 200) {
                                movementScore = Math.min(movementScore + 5, 100);
                                movementBar.style.width = movementScore + '%';
                                if (movementScore >= 100 && !livenessPassed) {
                                    livenessPassed = true;
                                    livenessHint.textContent = '✅ Қозғалыс расталды!';
                                    livenessHint.style.color = '#00ff88';
                                    clearInterval(livenessCheckInterval);
                                    livenessCheckInterval = null;
                                    if (palmStream && !palmCaptured) capturePalmImage();
                                }
                            }
                        }
                        lastHandPosition = { x: centerX, y: centerY };
                    }
                } catch(e) { console.error('Liveness error:', e); }
            }, 200);
        }
        
        function capturePalmImage() {
            if (!palmStream) return;
            const canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(palmVideo, 0, 0, 200, 200);
            palmCaptured = canvas.toDataURL('image/jpeg', 0.9);
            palmDetected = true;
            palmPreview.src = palmCaptured;
            palmPreviewContainer.style.display = 'block';
            palmStatus.textContent = '✅ Алақан тіркелді!';
            palmStatus.className = 'palm-status success';
            loginWithPalmBtn.disabled = false;
            if (palmStream) { palmStream.getTracks().forEach(t => t.stop()); palmStream = null; }
            palmVideo.srcObject = null;
            registerPalmBtn.disabled = true;
        }
        
        // ========== АЛАҚАН КАМЕРАСЫ ==========
        startPalmCam.addEventListener('click', async () => {
            if (!mediaPipeLoaded) {
                const loaded = await loadMediaPipeHands();
                if (!loaded) return;
            }
            try {
                if (palmStream) { palmStream.getTracks().forEach(t => t.stop()); palmStream = null; }
                palmStatus.textContent = '📷 Камера сұралуда...';
                palmStatus.className = 'palm-status waiting';
                palmStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                palmVideo.srcObject = palmStream;
                await new Promise(resolve => { palmVideo.onloadedmetadata = () => { palmVideo.play(); resolve(); }; });
                palmStatus.textContent = '📷 Камера дайын. Алақаныңызды көрсетіңіз';
                palmStatus.className = 'palm-status success';
                registerPalmBtn.disabled = false;
                startPalmCam.disabled = true;
                startLivenessDetection();
            } catch(e) {
                palmStatus.textContent = '❌ Камераға рұқсат берілмеді';

        });

            if (!existingUser) {
                palmUsers.push({ id: palmId, palmImage, deviceFingerprint, deviceInfo: fullDeviceInfo, registeredAt: new Date().toLocaleString('kk-KZ') });
