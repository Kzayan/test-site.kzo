<script>
(function(){
  "use strict";

  function badKey(e){
    const k = (e.key || "").toUpperCase();

    if (
      e.key === "F12" ||
      (e.ctrlKey && k === "U") ||
      (e.ctrlKey && k === "S") ||
      (e.ctrlKey && k === "P") ||
      (e.ctrlKey && k === "C" && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) ||
      (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k))
    ) {
      e.preventDefault();
      e.stopPropagation();
      alert("Бұл сайт қорғалған!");
      return false;
    }
  }

  document.addEventListener("contextmenu", e => e.preventDefault(), true);

  document.addEventListener("selectstart", e => {
    if (!["INPUT","TEXTAREA"].includes((e.target.tagName || "").toUpperCase())) {
      e.preventDefault();
    }
  }, true);

  document.addEventListener("copy", e => {
    if (!["INPUT","TEXTAREA"].includes((e.target.tagName || "").toUpperCase())) {
      e.preventDefault();
    }
  }, true);

  document.addEventListener("cut", e => e.preventDefault(), true);
  document.addEventListener("keydown", badKey, true);

  function guard(open) {
    let el = document.getElementById("devGuard");

    if (!el) {
      el = document.createElement("div");
      el.id = "devGuard";
      el.innerHTML = "<div><b>Сайт қорғалған</b><br><small>Developer tools жабылғаннан кейін жалғастырыңыз.</small></div>";
      document.documentElement.appendChild(el);
    }

    el.style.display = open ? "flex" : "none";
  }

  setInterval(function(){
    const opened =
      Math.abs(window.outerWidth - window.innerWidth) > 180 ||
      Math.abs(window.outerHeight - window.innerHeight) > 180;

    guard(opened);
  }, 900);
})();
</script>

let idx = 0;
let done = false;
let user = null;
let stream = null;
let model = false;
let face = null;
let faceOk = false;

let ans = Array(Q.length).fill(null);
let ok = Array(Q.length).fill(false);

const $ = id => document.getElementById(id);

const video = $("loginVideo");
const status = $("status");
const cameraBtn = $("cameraBtn");
const faceBtn = $("faceBtn");
const loginBtn = $("loginBtn");

function setStatus(t, c) {
  status.textContent = t;
  status.className = "status " + c;
}

async function loadModels() {
  try {
    setStatus("⏳ Модель жүктелуде...", "wait");

    const url = "https://justadudewhohacks.github.io/face-api.js/models";

    if (!window.faceapi) {
      throw new Error("face-api жүктелмеді");
    }

    await faceapi.nets.tinyFaceDetector.loadFromUri(url);
    await faceapi.nets.faceLandmark68Net.loadFromUri(url);

    model = true;
    setStatus("✅ Дайын. Камераны қосыңыз", "ok");
  } catch(e) {
    console.error(e);
    setStatus("❌ Модель жүктелмеді. Интернетті тексеріңіз", "err");
  }
}

window.addEventListener("load", loadModels);

cameraBtn.onclick = async () => {
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    setStatus("📷 Камера сұралуда...", "wait");

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: 640,
        height: 480
      }
    });

    video.srcObject = stream;

    await new Promise(res => {
      video.onloadedmetadata = () => {
        video.play();
        res();
      };
    });

    setStatus("📷 Камера дайын", "ok");
    faceBtn.disabled = false;
    cameraBtn.disabled = true;
  } catch(e) {
    console.error(e);
    setStatus("❌ Камераға рұқсат берілмеді", "err");
  }
};

faceBtn.onclick = async () => {
  if (!model) {
    setStatus("⏳ Модель әлі жүктелуде...", "wait");
    return;
  }

  setStatus("🔍 Бет ізделуде...", "wait");

  try {
    const d = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks();

    if (d.length === 0) throw new Error("Бет табылмады");
    if (d.length > 1) throw new Error("Бірнеше бет табылды");
    if (d[0].detection.score < .7) throw new Error("Бет анық емес");

    const box = d[0].detection.box;
    const pad = 40;
    const can = document.createElement("canvas");
    const ctx = can.getContext("2d");

    const x = Math.max(0, box.x - pad);
    const y = Math.max(0, box.y - pad);
    const w = Math.min(box.width + pad * 2, video.videoWidth - x);
    const h = Math.min(box.height + pad * 2, video.videoHeight - y);

    can.width = 200;
    can.height = 200;

    ctx.drawImage(video, x, y, w, h, 0, 0, 200, 200);

    face = can.toDataURL("image/jpeg", .9);
    faceOk = true;

    $("faceImg").src = face;
    $("preview").style.display = "block";

    setStatus("✅ Бет танылды!", "ok");

    loginBtn.disabled = false;

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    stream = null;
    video.srcObject = null;
    faceBtn.disabled = true;
  } catch(e) {
    setStatus("❌ " + e.message, "err");
  }
};

loginBtn.onclick = () => {
  if (!faceOk) {
    alert("Алдымен бетіңізді танытыңыз");
    return;
  }

  if ($("loginPass").value.trim() !== LOGIN_PASSWORD) {
    alert("Қате пароль! 2510 енгізіңіз");
    return;
  }

  user = { face };

  $("loginScreen").classList.add("hidden");
  $("main").classList.add("visible");

  render();
  stats();
};

$("loginPass").addEventListener("keypress", e => {
  if (e.key === "Enter" && !loginBtn.disabled) {
    loginBtn.click();
  }
});

function render() {
  if (done) return;

  const q = Q[idx];
  const sel = ans[idx];

  let html = '<div class="card"><div class="qtext">' + (idx + 1) + '. ' + q[0] + '</div><div class="opts">';

  q[1].forEach((o, i) => {
    let c = "opt";

    if (sel !== null) {
      if (i === q[2]) c += " correct";
      else if (i === sel) c += " wrong";
      c += " disabled";
    }

    html += '<div class="' + c + '" data-i="' + i + '">' + o + '</div>';
  });

  html += '</div></div>';

  $("test").innerHTML = html;

  if (sel === null) {
    document.querySelectorAll(".opt").forEach(el => {
      el.onclick = () => choose(+el.dataset.i);
    });
  }

  $("now").textContent = idx + 1;
  $("total").textContent = Q.length;
  $("prev").disabled = idx === 0;
  $("next").disabled = idx === Q.length - 1;
}

function choose(i) {
  if (ans[idx] !== null) return;

  ans[idx] = i;
  ok[idx] = i === Q[idx][2];

  render();
  stats();

  if (idx < Q.length - 1) {
    setTimeout(() => {
      idx++;
      render();
    }, 250);
  }
}

function stats() {
  const c = ok.filter(Boolean).length;
  const w = ans.filter((a, i) => a !== null && !ok[i]).length;

  $("correct").textContent = c;
  $("wrong").textContent = w;
}

function save() {
  if (!user) return;

  const c = ok.filter(Boolean).length;
  const w = ans.filter((a, i) => a !== null && !ok[i]).length;

  const all = JSON.parse(localStorage.getItem(STORE) || "[]");

  all.push({
    id: Date.now() + "-" + Math.random().toString(36).slice(2, 10),
    face: user.face,
    correct: c,
    wrong: w,
    total: Q.length,
    date: new Date().toLocaleString("kk-KZ")
  });

  localStorage.setItem(STORE, JSON.stringify(all));
}

function finish() {
  done = true;
  save();

  const c = ok.filter(Boolean).length;
  const w = ans.filter((a, i) => a !== null && !ok[i]).length;

  $("test").classList.add("hidden");
  $("nav").classList.add("hidden");
  $("result").classList.remove("hidden");

  $("result").innerHTML =
    '<div class="result">' +
      '<h2>Нәтиже</h2>' +
      '<div style="font-size:5rem;color:#ff2020;font-weight:950">' + c + '</div>' +
      '<p style="font-size:1.3rem;margin:20px 0">' + Q.length + ' сұрақтың ішінен</p>' +
      '<div style="display:flex;justify-content:center;gap:40px;margin:30px 0;flex-wrap:wrap">' +
        '<div><span style="color:#00c853">✔ Дұрыс:</span> ' + c + '</div>' +
        '<div><span style="color:#ff4141">✖ Қате:</span> ' + w + '</div>' +
      '</div>' +
      '<button class="restart" onclick="location.reload()">Қайтадан бастау</button>' +
    '</div>';
}

$("prev").onclick = () => {
  if (idx > 0) {
    idx--;
    render();
  }
};

$("next").onclick = () => {
  if (idx < Q.length - 1) {
    idx++;
    render();
  }
};

$("finish").onclick = finish;

const adminModal = $("adminModal");
const imgModal = $("imgModal");
const bigImg = $("bigImg");

$("adminOpen").onclick = () => {
  adminModal.style.display = "block";
  document.body.style.overflow = "hidden";
};

$("adminClose").onclick = () => {
  adminModal.style.display = "none";
  document.body.style.overflow = "auto";
};

adminModal.onclick = e => {
  if (e.target === adminModal) {
    adminModal.style.display = "none";
    document.body.style.overflow = "auto";
  }
};

$("adminBtn").onclick = () => {
  if ($("adminPass").value === ADMIN_PASS) {
    $("adminLogin").classList.add("hidden");
    $("adminContent").classList.remove("hidden");
    $("adminErr").textContent = "";
    table();
  } else {
    $("adminErr").textContent = "Қате құпия сөз!";
  }
};

$("adminPass").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    $("adminBtn").click();
  }
});

function table() {
  const all = JSON.parse(localStorage.getItem(STORE) || "[]");
  const tb = $("tbody");

  $("countUsers").textContent = all.length;

  if (!all.length) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px">Әзірге нәтиже жоқ<\/td></tr>';
    return;
  }

  tb.innerHTML = [...all].reverse().map((r, i) =>
    '<tr>' +
      '<td>' + (i + 1) + '<\/td>' +
      '<td class="faceCell" data-face="' + (r.face || "") + '">' +
        (r.face ? '<img src="' + r.face + '" class="thumb" alt="Бет">' : '📷 Сурет жоқ') +
      '<\/td>' +
      '<td style="color:#00c853;font-weight:bold">' + r.correct + '<\/td>' +
      '<td style="color:#ff4141;font-weight:bold">' + r.wrong + '<\/td>' +
      '<td>' + (r.total || Q.length) + '<\/td>' +
      '<td>' + r.date + '<\/td>' +
      '<td><button class="del" data-id="' + r.id + '">Жою<\/button><\/td>' +
    '<\/tr>'
  ).join("");

  document.querySelectorAll(".faceCell").forEach(td => {
    td.onclick = () => {
      if (td.dataset.face) {
        bigImg.src = td.dataset.face;
        imgModal.style.display = "flex";
      }
    };
  });

  document.querySelectorAll(".del").forEach(b => {
    b.onclick = e => {
      e.stopPropagation();

      if (confirm("Бұл нәтижені жоюға сенімдісіз бе?")) {
        let a = JSON.parse(localStorage.getItem(STORE) || "[]")
          .filter(x => x.id !== b.dataset.id);

        localStorage.setItem(STORE, JSON.stringify(a));
        table();
      }
    };
  });
}

$("clearAll").onclick = () => {
  if (confirm("БАРЛЫҚ нәтижелерді жоюға сенімдісіз бе?")) {
    localStorage.removeItem(STORE);
    table();
  }
};

imgModal.onclick = () => {
  imgModal.style.display = "none";
};

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    adminModal.style.display = "none";
    imgModal.style.display = "none";
    document.body.style.overflow = "auto";
  }
});
})();
</script>
</body>
</html>
