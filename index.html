<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qazaq TTS – Мәтінді аудиоға айналдыру</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎙️ Qazaq TTS Studio</h1>
        <p>Жасанды интеллект көмегімен мәтінді қазақша аудиоға айналдыру</p>
    </div>

    <div class="main-content">
        <div class="input-section">
            <label for="textInput">📝 Қазақша мәтініңіз:</label>
            <textarea id="textInput" rows="5" placeholder="Мысалы: Сәлеметсіз бе! Бұл жасанды интеллект арқылы жасалған қазақша дауыс."></textarea>
            <div class="char-info">
                <span id="charCount">0</span> символ
                <span id="warningMsg" class="warning"></span>
            </div>
        </div>

        <div class="button-group">
            <button id="generateBtn" class="btn btn-primary">
                🎧 Аудио жасау
            </button>
            <button id="clearBtn" class="btn btn-secondary">
                🗑️ Тазалау
            </button>
        </div>

        <div id="audioContainer" class="audio-container" style="display: none;">
            <div class="audio-header">
                <span>🔊 Дыбыстық нәтиже</span>
            </div>
            <audio id="audioPlayer" controls></audio>
            <button id="downloadBtn" class="btn btn-download">
                💾 Аудионы жүктеп алу (MP3)
            </button>
        </div>

        <div id="status" class="status">
            ✨ Мәтінді енгізіп, «Аудио жасау» батырмасын басыңыз
        </div>
    </div>

    <div class="footer">
        ⚡ Қазақ тіліндегі дыбыстау технологиясы | Тегін сервис
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
