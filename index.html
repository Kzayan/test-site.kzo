<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Qazaq TTS – Мәтінді аудиоға айналдыру</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Qazaq TTS Studio</h1>
        <p>Жасанды интеллект көмегімен мәтінді қазақша аудиоға айналдырыңыз</p>
    </div>

    <div class="content">
        <div class="textarea-group">
            <label>📝 Қазақша мәтініңіз:</label>
            <textarea id="textInput" rows="5" placeholder="Мысалы: Сәлем, бұл жасанды интеллект арқылы жасалған қазақша дауыс. Технологияның мүмкіндігі шексіз!"></textarea>
            <div class="char-counter">
                <span id="charCount">0</span> символ
            </div>
        </div>

        <div class="button-group">
            <button id="generateBtn" class="btn btn-primary">
                🎧 Аудио жасау
            </button>
            <button id="clearBtn" class="btn btn-secondary">
                🧹 Тазалау
            </button>
        </div>

        <div class="audio-section" id="audioSection" style="display: none;">
            <div class="audio-title">
                <span>🔊 Дыбыстық нәтиже</span>
            </div>
            <audio id="audioPlayer" controls preload="metadata">
                <source src="" type="audio/mpeg">
                Браузеріңіз аудио элементін қолдамайды.
            </audio>
            <div class="download-area">
                <button id="downloadBtn" class="btn btn-download">
                    ⬇️ Аудионы жүктеп алу (MP3)
                </button>
                <span class="api-info">Қазақша TTS API</span>
            </div>
        </div>

        <div id="statusMsg" class="status-message">
            ✨ Мәтінді енгізіп, «Аудио жасау» батырмасын басыңыз.
        </div>
    </div>
    
    <footer>
        ⚡ Қазақ тіліндегі жасанды интеллект | Дыбыстау технологиясы
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
