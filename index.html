  // ===== НАВИГАЦИЯ =====
  window.navigate = function(page) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + page)?.classList.add('active');
    
    const main = document.getElementById('main-content');

    if (isAdminMode) {
      renderAdminPanel(main);
      return;
    }

    switch(page) {
      case 'home': renderHome(main); break;
      case 'questions': renderQuestions(main); break;
      case 'vets': renderVets(main); break;
      case 'profile': renderProfile(main); break;
      case 'faq': renderFAQ(main); break;
    }
  }

  async function loadAdminQuestions() {
    const container = document.getElementById('admin-questions-list');
    let questions = [];
    
    if (db) {
      try {
        const q = query(collection(db, 'questions'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        questions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch(e) {}
    }
    
    if (questions.length === 0) {
      questions = [
        { id: 'demo1', author: 'Айгерім', category: 'stomach', text: 'Мысығым 2 күннен бері тамақ ішпейді...', location: 'Алматы' },

      ];
    }
    
    container.innerHTML = questions.map(q => `
      <div class="admin-question-card">
        <div class="admin-q-header">
          <span class="admin-q-author">🐱 ${q.author || 'Пайдаланушы'}</span>
          <span class="admin-q-cat">${t[currentLang].cats[q.category] || q.category}</span>

        <p class="admin-q-text">${q.text}</p>

        <div class="admin-actions">
          <input type="text" placeholder="${t[currentLang].adminAnswerPlaceholder}" id="admin-answer-${q.id}" class="admin-answer-input">
          <button class="btn-primary btn-sm" onclick="submitAdminAnswer('${q.id}')">${t[currentLang].adminReply}</button>
        </div>
      </div>
    `).join('');
  }

  window.submitAdminAnswer = async function(qId) {
    const input = document.getElementById(`admin-answer-${qId}`);
    const text = input.value.trim();
    if (!text) return;
    
    const bestEl = document.getElementById(`best-${qId}`);
    if (bestEl) {
      bestEl.classList.remove('hidden');
      bestEl.innerHTML = `✅ ${text}`;
    }
    
    if (db) {
      try {
        await updateDoc(doc(db, 'questions', qId), { bestAnswer: text, answers: increment(1) });
      } catch(e) {
        await setDoc(doc(db, 'questions', qId), { bestAnswer: text, answers: 1 });
      }
    }
    
    input.value = '';
    showToast('✅ Жауап жіберілді!');
  }

        const q = query(collection(db, 'questions'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        questions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch(e) {}
    }
    if (questions.length === 0) {
      questions = [
        { id: 'q1', author: 'Айгерім', category: 'stomach', text: 'Мысығым 2 күннен бері тамақ ішпейді...', answers: 3, likes: 12 },
        { id: 'q2', author: 'Болат', category: 'skin', text: 'Мысығымның терісінде қышу мен бөртпелер пайда болды...', answers: 2, likes: 8 },
        { id: 'q3', author: 'Камила', category: 'behavior', text: 'Мысығым кенеттен агрессивті болып кетті...', answers: 5, likes: 21 },
      ];
    }
    container.innerHTML = questions.map(q => renderQuestionCard(q)).join('');
  }

  function renderQuestionCard(q) {
    const catEmoji = { stomach: '🫁', skin: '🩹', behavior: '🧠', other: '📌' };
    return `
    <div class="question-card" data-cat="${q.category}">
      <div class="question-header">
        <div class="question-author">
          <span class="author-avatar">🐱</span>
          <div>
            <div class="author-name">${q.author || 'Пайдаланушы'}</div>
            <div class="question-meta">${catEmoji[q.category]} ${q.location || ''}</div>
          </div>
        </div>
        ${q.bestAnswer ? '<div class="best-badge">✅</div>' : ''}
      </div>
      <p class="question-text">${q.text}</p>
      <div class="question-footer">
        <button class="like-btn" onclick="event.stopPropagation(); likeQuestion('${q.id}', this)">❤️ <span>${q.likes || 0}</span></button>
        <span class="answers-count">💬 ${q.answers || 0} жауап</span>
      </div>
    </div>`;
  }

  // ===== ВЕТЕРИНАРЛАР =====
  function renderVets(el) {
    el.innerHTML = `
    <div class="page">
      <div class="page-header"><h2>${t[currentLang].vetsTitle}</h2></div>
      <div class="vets-list">
        ${demoVets.map(v => `
          <div class="vet-card">
            <div class="vet-avatar">${v.avatar}</div>
            <div class="vet-info">
              <div class="vet-name">${v.name}</div>
              <div class="vet-spec">${v.specialty}</div>
              <div class="vet-rating">⭐ ${v.rating}</div>
              <div class="vet-status-row"><span class="status-dot ${v.online ? 'online' : 'offline'}"></span>${v.online ? t[currentLang].online : t[currentLang].offline}</div>
            </div>
            <button class="btn-primary btn-sm" onclick="startChatWithVet('${v.id}')">${t[currentLang].startChat}</button>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  // ===== FAQ =====
  function renderFAQ(el) {
    const faqs = demoFAQ[currentLang];
    el.innerHTML = `
    <div class="page">
      <div class="page-header"><button class="back-btn" onclick="navigate('home')">←</button><h2>${t[currentLang].faqTitle}</h2></div>
      <div class="faq-list">
        ${faqs.map((f, i) => `
          <div class="faq-item" onclick="toggleFAQ(${i})">
            <div class="faq-q"><span>${f.q}</span><span class="faq-arrow" id="faq-arrow-${i}">▼</span></div>
            <div class="faq-a hidden" id="faq-a-${i}">${f.a}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  // ===== ПРОФИЛЬ =====
  function renderProfile(el) {
    const txt = t[currentLang];
    if (!currentUser) {
      el.innerHTML = `
      <div class="page page-center">
        <div class="profile-login-prompt">
          <div style="font-size:64px">🐱</div>
          <h2>Профильге кіру</h2>
          <p>Сұрақтарыңызды бақылау үшін кіріңіз</p>
          <p style="color:#22C55E;font-size:13px;margin-top:8px">📧 ${txt.anyEmailNote}</p>
          <button class="btn-primary" onclick="openAuthModal('login')" style="margin-top:20px">${txt.loginBtn}</button>
        </div>
      </div>`;
      return;
    }
    el.innerHTML = `
    <div class="page">
      <div class="profile-header">
        <div class="profile-avatar">${currentUser.displayName?.[0] || '🐱'}</div>
        <div class="profile-info">
          <div class="profile-name">${currentUser.displayName || 'Пайдаланушы'}</div>
          <div class="profile-email">${currentUser.email}</div>
        </div>
      </div>
      <button class="btn-outline full-width" onclick="handleLogout()">🚪 ${txt.logoutBtn}</button>
    </div>`;
  }

  // ===== AUTH =====
  function updateAuthUI() {
    const btn = document.getElementById('auth-header-btn');
    if (!btn) return;
    if (currentUser) {
      btn.innerHTML = `<div class="user-avatar-mini" onclick="navigate('profile')">${currentUser.displayName?.[0] || '🐱'}</div>`;
    } else {
      btn.innerHTML = `<button class="btn-login" onclick="openAuthModal('login')">${t[currentLang].loginBtn}</button>`;
    }
  }

  window.openAuthModal = function(tab) {
    document.getElementById('auth-modal').classList.remove('hidden');
    document.getElementById('modal-overlay').classList.remove('hidden');
    switchAuthTab(tab || 'login');
  }

  window.switchAuthTab = function(tab) {
    const txt = t[currentLang];
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    const container = document.getElementById('auth-form-container');
    
    if (tab === 'login') {
      container.innerHTML = `
        <p style="text-align:center;color:#22C55E;font-size:13px;margin-bottom:12px">📧 ${txt.anyEmailNote}</p>
        <div class="form-group"><input type="email" id="auth-email" placeholder="${txt.emailPlaceholder}" class="form-input"></div>
        <div class="form-group"><input type="password" id="auth-pass" placeholder="${txt.passwordPlaceholder}" class="form-input"></div>
        <button class="btn-primary full-width" onclick="handleLogin()">${txt.loginBtn}</button>
        <div class="auth-divider">немесе</div>
        <button class="btn-google full-width" onclick="handleGoogleLogin()">🔍 ${txt.loginGoogle}</button>
        <p class="auth-switch" onclick="switchAuthTab('register')">${txt.noAccount} <b>${txt.registerBtn}</b></p>
        <div id="auth-error" class="auth-error hidden"></div>
      `;
    } else {
      container.innerHTML = `
        <p style="text-align:center;color:#22C55E;font-size:13px;margin-bottom:12px">📧 ${txt.anyEmailNote}</p>
        <div class="form-group"><input type="text" id="auth-name" placeholder="${txt.namePlaceholder}" class="form-input"></div>
        <div class="form-group"><input type="email" id="auth-email" placeholder="${txt.emailPlaceholder}" class="form-input"></div>
        <div class="form-group"><input type="password" id="auth-pass" placeholder="${txt.passwordPlaceholder}" class="form-input"></div>
        <button class="btn-primary full-width" onclick="handleRegister()">${txt.registerBtn}</button>
        <div class="auth-divider">немесе</div>
        <button class="btn-google full-width" onclick="handleGoogleLogin()">🔍 ${txt.loginGoogle}</button>
        <p class="auth-switch" onclick="switchAuthTab('login')">${txt.hasAccount} <b>${txt.loginBtn}</b></p>
        <div id="auth-error" class="auth-error hidden"></div>
      `;
    }
  }

  window.handleLogin = async function() {
    const email = document.getElementById('auth-email')?.value;
    const pass = document.getElementById('auth-pass')?.value;
    if (!email || !pass) return;
    
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      closeModal();
      showToast('✅ Сәтті кірдіңіз!');
    } catch(e) {
      showAuthError(e.message);
    }
  }

  window.handleRegister = async function() {
    const name = document.getElementById('auth-name')?.value;
    const email = document.getElementById('auth-email')?.value;
    const pass = document.getElementById('auth-pass')?.value;
    if (!name || !email || !pass) return;
    
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      currentUser = cred.user;
      closeModal();
      updateAuthUI();
      showToast('✅ Тіркелу сәтті!');
    } catch(e) {
      showAuthError(e.message);
    }
  }

  window.handleGoogleLogin = async function() {
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
      closeModal();
      showToast('✅ Google арқылы кірдіңіз!');
    } catch(e) {
      showAuthError(e.message);
    }
  }

  window.handleLogout = async function() {
    await signOut(auth);
    currentUser = null;
    updateAuthUI();
    navigate('home');
    showToast('👋 Шықтыңыз');
  }

  function showAuthError(msg) {
    const el = document.getElementById('auth-error');
    if (el) { el.textContent = msg; el.classList.remove('hidden'); }
  }

  // ===== СҰРАҚ ҚОЮ =====
  window.submitQuestion = async function() {
    const text = document.getElementById('question-text')?.value;
    if (!text?.trim()) return;
    
    const data = {
      text,
      category: document.getElementById('question-category')?.value || 'other',
      location: document.getElementById('question-location')?.value || 'Белгісіз',
      author: currentUser?.displayName || 'Қонақ',
      likes: 0, answers: 0,
      createdAt: serverTimestamp(),
    };

    if (db) {
      await addDoc(collection(db, 'questions'), data);
    }
    closeModal();
    navigate('questions');
    showToast('✅ Сұрағыңыз жіберілді!');
  }

  window.openAskModal = function() {
    document.getElementById('ask-modal')?.classList.remove('hidden');
    document.getElementById('modal-overlay')?.classList.remove('hidden');
  }

  window.likeQuestion = async function(qId, btn) {
    const span = btn.querySelector('span');
    if (span) span.textContent = parseInt(span.textContent) + 1;
    btn.classList.add('liked');
  }

  window.filterQuestions = function(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.question-card').forEach(card => {
      card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
    });
  }

  // ===== ЧАТ =====
  window.startChatWithVet = function(vetId) {
    const vet = demoVets.find(v => v.id === vetId) || demoVets[0];
    const main = document.getElementById('main-content');
    main.innerHTML = `
    <div class="page page-chat">
      <div class="chat-header">
        <button class="back-btn" onclick="navigate('vets')">←</button>
        <div class="chat-vet-info">
          <div class="chat-avatar">${vet.avatar}</div>
          <div><div class="chat-vet-name">${vet.name}</div><div class="chat-status ${vet.online ? 'online' : 'offline'}">${vet.online ? 'Онлайн' : 'Оффлайн'}</div></div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-bubble vet"><div class="bubble-text">Сәлеметсіз бе! Мен ${vet.name}. Мысығыңыз туралы сұрағыңызды жазыңыз 🐱</div></div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Хабарлама жазыңыз..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>`;
    currentPage = 'chat';
  }

  window.sendMessage = function() {
    const input = document.getElementById('chat-input');
    const text = input?.value.trim();
    if (!text) return;
    
    const messages = document.getElementById('chat-messages');
    messages.innerHTML += `<div class="chat-bubble user"><div class="bubble-text">${text}</div></div>`;
    input.value = '';
    messages.scrollTop = messages.scrollHeight;
    
    setTimeout(() => {
      const replies = ['Рахмет! Мысығыңыздың жасы қанша?', 'Түсінікті. Ветеринарға көрсетіңіз.', 'Уайымдамаңыз, бұл жиі кездеседі.'];
      messages.innerHTML += `<div class="chat-bubble vet"><div class="bubble-text">${replies[Math.floor(Math.random() * replies.length)]}</div></div>`;
      messages.scrollTop = messages.scrollHeight;
    }, 1000);
  }

  // ===== КӨМЕКШІ =====
  window.closeModal = function() {
    document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
    document.getElementById('modal-overlay')?.classList.add('hidden');
  }

  window.toggleDark = function() {
    darkMode = !darkMode;
    localStorage.setItem('vetcare_dark', darkMode);
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
    renderApp();
    navigate(currentPage);
  }

  window.toggleLang = function() {
    currentLang = currentLang === 'kk' ? 'ru' : 'kk';
    localStorage.setItem('vetcare_lang', currentLang);
    renderApp();
    navigate(currentPage);
  }

  window.toggleFAQ = function(i) {
    const a = document.getElementById('faq-a-' + i);
    const arrow = document.getElementById('faq-arrow-' + i);
    a?.classList.toggle('hidden');
    if (arrow) arrow.textContent = a?.classList.contains('hidden') ? '▼' : '▲';
  }

  window.previewPhoto = function(input) {
    const preview = document.getElementById('photo-preview');
    if (input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.innerHTML = `<img src="${e.target.result}" style="max-height:120px;border-radius:12px">`; };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
</script>

.chat-bubble { max-width: 75%; border-radius: 18px; padding: 10px 14px; }

.chat-bubble.user { background: var(--primary); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
.bubble-text { font-size: 14px; line-height: 1.4; }
.chat-input-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
.chat-input-row input { flex: 1; background: var(--bg2); border: none; border-radius: 20px; padding: 10px 16px; font-size: 14px; color: var(--text); outline: none; }
.send-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.faq-list { display: flex; flex-direction: column; gap: 10px; }
.faq-item { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.faq-q { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; font-weight: 700; font-size: 14px; }
.faq-a { padding: 0 16px 14px; font-size: 14px; line-height: 1.6; color: var(--text2); }
.faq-home-btn { margin: 16px; background: var(--surface); border-radius: var(--radius); padding: 14px 16px; font-weight: 700; color: var(--primary); cursor: pointer; text-align: center; box-shadow: var(--shadow2); border: 1px solid var(--border); }
.profile-login-prompt { text-align: center; color: var(--text2); }
.profile-header { display: flex; align-items: center; gap: 16px; background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow2); }
.profile-avatar { width: 56px; height: 56px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; }
.profile-name { font-size: 18px; font-weight: 800; }
.profile-email { font-size: 13px; color: var(--text2); }
.loading { text-align: center; padding: 20px; color: var(--text2); }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.admin-questions { display: flex; flex-direction: column; gap: 16px; }
.admin-question-card { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow2); border: 1px solid var(--border); }
.admin-q-header { display: flex; gap: 12px; margin-bottom: 10px; font-size: 13px; color: var(--text2); }
.admin-q-author { font-weight: 700; color: var(--text); }
.admin-q-text { font-size: 14px; margin-bottom: 12px; }
.admin-actions { display: flex; gap: 8px; margin-top: 12px; }
.admin-answer-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--text); outline: none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; backdrop-filter: blur(4px); }
.modal { position: fixed; bottom: 0; left: 0; right: 0; z-index: 201; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-card { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; max-height: 85vh; overflow-y: auto; max-width: 600px; margin: 0 auto; }
.modal-close { position: absolute; top: 16px; right: 20px; background: var(--bg2); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 14px; cursor: pointer; color: var(--text); }
.modal-title { font-family: 'Raleway', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 20px; }
.modal-tabs { display: flex; gap: 4px; background: var(--bg2); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
.tab-btn { flex: 1; background: none; border: none; border-radius: 10px; padding: 8px; font-weight: 700; font-size: 14px; cursor: pointer; color: var(--text2); }
.tab-btn.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow2); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.form-group textarea, .form-group select, .form-group input, .form-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; color: var(--text); outline: none; }
.photo-upload { background: var(--bg2); border: 2px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; font-size: 14px; color: var(--text2); }
.auth-divider { text-align: center; color: var(--text2); font-size: 13px; margin: 14px 0; position: relative; }
.auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border); }
.auth-divider::before { left: 0; } .auth-divider::after { right: 0; }
.btn-google { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text); margin-bottom: 10px; width: 100%; }
.auth-switch { text-align: center; font-size: 13px; color: var(--text2); cursor: pointer; margin-top: 12px; }
.auth-switch b { color: var(--primary); }
.auth-error { background: #FEE; color: #E00; border-radius: 8px; padding: 8px 12px; font-size: 13px; margin-top: 10px; }
.best-answer-box { background: rgba(34,197,94,0.1); border: 1px solid #22C55E; border-radius: 12px; padding: 12px; font-size: 14px; color: var(--text); margin-bottom: 12px; }
.toast { position: fixed; bottom: calc(var(--nav-h) + 20px); left: 50%; transform: translateX(-50%); background: #1A1A2E; color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; font-weight: 700; z-index: 999; animation: fadeInOut 3s ease; }
@keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; } }
.hidden { display: none !important; }
</style>
