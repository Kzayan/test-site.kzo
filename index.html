        // ========== ҚҰРЫЛҒЫНЫ АВТОМАТТЫ АНЫҚТАУ ==========
        function detectDeviceType() {
            const ua = navigator.userAgent;
            const width = window.innerWidth;
            
            let deviceType = 'desktop';
            let deviceIcon = '💻';
            let deviceClass = 'device-desktop';
            
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) {
                deviceType = 'tablet';
                deviceIcon = '📱';
                deviceClass = 'device-tablet';
            } else if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) {
                deviceType = 'mobile';
                deviceIcon = '📱';
                deviceClass = 'device-mobile';
            } else if (/(Macintosh|MacIntel|MacPPC|Mac68K|Mac OS X)/i.test(ua) && !/(iPhone|iPad|iPod)/i.test(ua)) {
                deviceType = 'laptop';
                deviceIcon = '💻';
                deviceClass = 'device-laptop';
            } else if (/(Win64|WOW64|Win32)/i.test(ua)) {
                deviceType = 'desktop';
                deviceIcon = '🖥️';
                deviceClass = 'device-desktop';
            }
            
            if (width <= 480) {
                deviceType = 'mobile';
                deviceIcon = '📱';
                deviceClass = 'device-mobile';
            } else if (width <= 768) {
                deviceType = 'tablet';
                deviceIcon = '📱';
                deviceClass = 'device-tablet';
            }
            
            return { deviceType, deviceIcon, deviceClass };
        }
        
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Белгісіз';
            if (ua.includes('Edg/')) browser = 'Edge';
            else if (ua.includes('OPR/') || ua.includes('Opera')) browser = 'Opera';
            else if (ua.includes('Chrome/')) browser = 'Chrome';
            else if (ua.includes('Safari/') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Firefox/')) browser = 'Firefox';
            return browser;
        }
        
        function getOSInfo() {
            const ua = navigator.userAgent;
            let os = 'Белгісіз';
            if (ua.includes('Windows NT 10.0')) os = 'Windows 10/11';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac OS X')) os = 'macOS';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('Linux')) os = 'Linux';
            return os;
        }
        
        function getDetailedDeviceInfo() {
            const device = detectDeviceType();
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            return {
                type: device.deviceType,
                typeIcon: device.deviceIcon,
                typeClass: device.deviceClass,

        ];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function shuffleQuestionOptions(question) {
            const optionsWithIndex = question.options.map((opt, idx) => ({ opt, originalIndex: idx }));
            const shuffled = shuffleArray([...optionsWithIndex]);
            const newCorrectIndex = shuffled.findIndex(item => item.originalIndex === question.correct);
            return {
                q: question.q,
                options: shuffled.map(item => item.opt),
                correct: newCorrectIndex
            };
        }

        // Шапалақ дыбысын анықтау
        async function startClapDetection() {
            try {
                clapStatus.textContent = '🎤 Микрофонға рұқсат сұралуда...';
                clapStatus.className = 'clap-info waiting';
                
                // Микрофон ағынын алу
                clapStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // AudioContext құру
                clapAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = clapAudioContext.createMediaStreamSource(clapStream);
                
                // Анализатор құру
                const analyser = clapAudioContext.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                source.connect(analyser);
                
                clapStatus.textContent = '👏 Микрофон дайын. Шапалақтаңыз!';
                clapStatus.className = 'clap-info success';
                clapDetectionActive = true;
                clapCount = 0;
                clapCountSpan.textContent = `0/${CLAP_REQUIRED}`;
                startClapDetectionBtn.disabled = true;
                
                // Шапалақты анықтау циклі
                let lastClapTime = 0;
                const CLAP_COOLDOWN = 500; // мс
                
                function detectClap() {
                    if (!clapDetectionActive) return;
                    
                    analyser.getByteFrequencyData(dataArray);
                    
                    // Орташа дыбыс деңгейін есептеу
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    const average = sum / bufferLength;
                    const normalizedVolume = average / 255; // 0-1 аралығына келтіру
                    
                    // Шектен жоғары болса және коoldown уақыты өткен болса
                    const now = Date.now();
                    if (normalizedVolume > CLAP_THRESHOLD && (now - lastClapTime) > CLAP_COOLDOWN) {
                        lastClapTime = now;
                        clapCount++;
                        clapCountSpan.textContent = `${clapCount}/${CLAP_REQUIRED}`;
                        
                        // Визуалды кері байланыс
                        clapHands.style.transform = 'scale(0.8)';
                        setTimeout(() => clapHands.style.transform = 'scale(1)', 100);
                        
                        clapStatus.textContent = `👏 Шапалақ анықталды! (${clapCount}/${CLAP_REQUIRED})`;
                        
                        // Қажетті шапалақ санына жетсек
                        if (clapCount >= CLAP_REQUIRED) {
                            clapDetected = true;
                            clapStatus.textContent = '✅ Шапалақпен кіруге дайын!';
                            clapStatus.className = 'clap-info success';
                            clapLoginBtn.disabled = false;
                            stopClapDetection();
                        }
                    }
                    
                    requestAnimationFrame(detectClap);
                }
                
                detectClap();
                
            } catch (error) {
                console.error('Микрофон қатесі:', error);
                clapStatus.textContent = '❌ Микрофонға рұқсат берілмеді';
                clapStatus.className = 'clap-info error';
                startClapDetectionBtn.disabled = false;
            }
        }
        
        function stopClapDetection() {
            clapDetectionActive = false;
            if (clapStream) {
                clapStream.getTracks().forEach(track => track.stop());
                clapStream = null;
            }
            if (clapAudioContext) {
                clapAudioContext.close();
                clapAudioContext = null;
            }
        }
        
        // Шапалақпен кіру
        function clapLogin() {
            if (!clapDetected) {
                alert('Алдымен шапалақтап, дыбысты танытыңыз');
                return;
            }
            
            // Шапалақ визуализациясы үшін сурет генерациялау
            const clapCanvas = document.createElement('canvas');
            clapCanvas.width = 150;
            clapCanvas.height = 150;
            const ctx = clapCanvas.getContext('2d');
            
            // Шапалақ суретін салу
            const gradient = ctx.createRadialGradient(75, 75, 0, 75, 75, 75);
            gradient.addColorStop(0, '#ffaa00');
            gradient.addColorStop(1, '#2a1a0a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 150, 150);
            
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('👏', 75, 75);
            
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, 150, 150);
            
            const clapImage = clapCanvas.toDataURL('image/png');
            
            proceedToLogin('clap', null, clapImage);
        }
        
        // Батырма оқиғалары
        startClapDetectionBtn.addEventListener('click', startClapDetection);
        clapLoginBtn.addEventListener('click', clapLogin);
        
        // Қолмен шапалақтау (сенсорлы экрандар үшін балама)
        clapHands.addEventListener('click', () => {
            if (clapDetectionActive) return;
            
            clapCount++;
            clapCountSpan.textContent = `${clapCount}/${CLAP_REQUIRED}`;
            
            clapHands.style.transform = 'scale(0.8)';
            setTimeout(() => clapHands.style.transform = 'scale(1)', 100);
            
            clapStatus.textContent = `👏 Қолмен шапалақ (${clapCount}/${CLAP_REQUIRED})`;
            
            if (clapCount >= CLAP_REQUIRED) {
                clapDetected = true;
                clapStatus.textContent = '✅ Шапалақпен кіруге дайын!';
                clapStatus.className = 'clap-info success';
                clapLoginBtn.disabled = false;
            }
        });
        
        // ========== КАМЕРА (өзгеріссіз) ==========
        startLoginCam.addEventListener('click', async () => {
            // ... (өзгеріссіз)
        });
        
        captureLoginFace.addEventListener('click', async () => {
            // ... (өзгеріссіз)
        });
        
        faceLoginBtn.addEventListener('click', () => {
            if (!loginFaceDetected) { alert('Алдымен түріңізді танытыңыз'); return; }
            proceedToLogin('face', loginFaceCaptured, null);
        });
        
        // ========== КІРУ ФУНКЦИЯСЫ (ЖАҢАРТЫЛҒАН) ==========
        function proceedToLogin(method, faceData, imageData) {
            // Камера/микрофон ағындарын тоқтату
            if (loginStream) {
                loginStream.getTracks().forEach(t => t.stop());
                loginStream = null;
            }
            stopClapDetection();
            
            currentUser = {
                face: faceData,
                loginMethod: method,
                fingerprintImage: method === 'biometric' ? imageData : null,
                clapImage: method === 'clap' ? imageData : null,
                deviceInfo: fullDeviceInfo,
                name: method === 'face' ? 'Түрмен кірді' : 
                      method === 'biometric' ? 'Саусақ ізімен кірді' : 'Шапалақпен кірді',
                loginTime: new Date().toLocaleString('kk-KZ')
            };
            
            QUESTIONS = getQuestionsWithShuffledOptions();
            answers = new Array(TOTAL_QUESTIONS).fill(null);
            questionStatus = new Array(TOTAL_QUESTIONS).fill(false);
            currentIndex = 0;
            testFinished = false;
            
            loginScreen.classList.add('hidden');
            mainSite.classList.add('visible');
            userInfoBar.innerHTML = `👤 ${currentUser.name} | ${fullDeviceInfo.typeIcon} ${fullDeviceInfo.type}`;
            shuffleIndicator.textContent = '🔄 ВАРИАНТТАР АРАЛАСТЫ';
            renderQuestion();
            updateStats();
        }
        
        // ========== ТЕСТ (өзгеріссіз) ==========
        function renderQuestion() {
            // ... (өзгеріссіз)
        }
        
        function checkAllAnswered() {
            // ... (өзгеріссіз)
        }
        
        function selectAnswer(optIdx) {
            // ... (өзгеріссіз)
        }
        
        function updateStats() {
            // ... (өзгеріссіз)
        }
        
        function saveResult() {
            if (!currentUser) return;
            
            const correct = questionStatus.filter(v => v === true).length;
            const wrong = answers.filter((a, i) => a !== null && !questionStatus[i]).length;
            
            const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            const record = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                face: currentUser.face,
                loginMethod: currentUser.loginMethod,
                fingerprintImage: currentUser.fingerprintImage,
                clapImage: currentUser.clapImage,
                deviceInfo: currentUser.deviceInfo,
                correct: correct, 
                wrong: wrong, 
                total: TOTAL_QUESTIONS,
                date: new Date().toLocaleString('kk-KZ')
            };
            
            results.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
        }
        
        function finishTest() {
            // ... (өзгеріссіз)
        }
        
        prevBtn.addEventListener('click', () => {
            // ... (өзгеріссіз)
        });
        
        nextBtn.addEventListener('click', () => {
            // ... (өзгеріссіз)
        });
        
        // ========== АДМИН (ЖАҢАРТЫЛҒАН - шапалақ көрсету) ==========
        const adminModal = document.getElementById('adminModal');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        
        document.getElementById('showAdminBtn').addEventListener('click', () => {
            adminModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        });
        
        document.getElementById('closeAdminBtn').addEventListener('click', () => {
            adminModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        });
        
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
        
        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('adminPasswordScreen').classList.add('hidden');
                document.getElementById('adminPanelContent').classList.remove('hidden');
                renderAdminTable();
                document.getElementById('adminError').textContent = '';
            } else {
                document.getElementById('adminError').textContent = 'Қате құпия сөз!';
            }
        });
        
        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('adminLoginBtn').click();
        });
        
        function renderAdminTable() {
            const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            document.getElementById('adminTotalUsers').textContent = results.length;
            
            const tbody = document.getElementById('adminTableBody');
            
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="12" style="text-align:center; padding:40px;">Әзірге нәтиже жоқ</td></tr>';
                return;
            }
            
            const reversed = [...results].reverse();
            
            tbody.innerHTML = reversed.map((r, i) => {
                const percentage = Math.round((r.correct / r.total) * 100);
                let loginMethodBadge = '';
                if (r.loginMethod === 'biometric') {
                    loginMethodBadge = '<span class="biometric-badge">🖐️ САУСАҚ ІЗІ</span>';
                } else if (r.loginMethod === 'clap') {
                    loginMethodBadge = '<span style="display:inline-block; background:#ffaa00; color:#0a0e14; padding:4px 10px; border-radius:12px; font-size:0.75rem; font-weight:bold;">👏 ШАПАЛАҚ</span>';
                } else {
                    loginMethodBadge = '<span class="face-badge">📷 ТҮР</span>';
                }
                
                let deviceType = '—';
                let deviceTypeClass = 'device-desktop';
                let deviceIcon = '💻';
                let browser = '—';
                let os = '—';
                let screen = '—';
                
                if (r.deviceInfo) {
                    deviceType = r.deviceInfo.type || 'desktop';
                    deviceTypeClass = r.deviceInfo.typeClass || 'device-desktop';
                    deviceIcon = r.deviceInfo.typeIcon || '💻';
                    browser = r.deviceInfo.browser || 'Белгісіз';
                    os = r.deviceInfo.os || 'Белгісіз';
                    screen = r.deviceInfo.screen || '—';
                }
                
                let fingerprintCell = '—';
                if (r.loginMethod === 'biometric' && r.fingerprintImage) {
                    fingerprintCell = `<img src="${r.fingerprintImage}" class="fingerprint-thumb" alt="Саусақ ізі" onclick="document.getElementById('modalImage').src='${r.fingerprintImage}'; document.getElementById('imageModal').style.display='flex';">`;
                } else if (r.loginMethod === 'clap' && r.clapImage) {
                    fingerprintCell = `<img src="${r.clapImage}" class="fingerprint-thumb" style="border-color:#ffaa00;" alt="Шапалақ" onclick="document.getElementById('modalImage').src='${r.clapImage}'; document.getElementById('imageModal').style.display='flex';">`;
                } else if (r.loginMethod === 'biometric') {
                    fingerprintCell = '<div class="fingerprint-thumb" style="display:flex;align-items:center;justify-content:center;">🖐️</div>';
                } else if (r.loginMethod === 'clap') {
                    fingerprintCell = '<div class="fingerprint-thumb" style="display:flex;align-items:center;justify-content:center;border-color:#ffaa00;">👏</div>';
                }
                
                return `
                <tr>
                    <td>${i+1}</td>
                    <td style="cursor:pointer;" onclick="${r.face ? `document.getElementById('modalImage').src='${r.face}'; document.getElementById('imageModal').style.display='flex';` : ''}">
                        ${r.face ? `<img src="${r.face}" class="face-thumb" alt="Түр">` : '—'}
                    </td>
                    <td>${fingerprintCell}</td>
                    <td>${loginMethodBadge}</td>
                    <td><span class="device-type-badge ${deviceTypeClass}">${deviceIcon} ${deviceType}</span></td>
                    <td><small>${browser}<br>${os}</small></td>
                    <td><small>${screen}</small></td>
                    <td style="color:#00c853; font-weight:bold;">${r.correct}</td>
                    <td style="color:#ff3b3b; font-weight:bold;">${r.wrong}</td>
                    <td style="color:${percentage >= 50 ? '#00c853' : '#ff3b3b'}; font-weight:bold;">${percentage}%</td>
                    <td><small>${r.date}</small></td>
                    <td><button class="delete-btn" data-id="${r.id}">ЖОЮ</button></td>
                </tr>
            `}).join('');
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Бұл нәтижені жоюға сенімдісіз бе?')) {
                        const id = e.target.dataset.id;
                        let allResults = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                        allResults = allResults.filter(r => r.id !== id);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(allResults));
                        renderAdminTable();
                    }
                });
            });
        }
        
        document.getElementById('clearAllResultsBtn').addEventListener('click', () => {
            if (confirm('БАРЛЫҚ нәтижелерді жоюға сенімдісіз бе?')) {
                localStorage.removeItem(STORAGE_KEY);
                renderAdminTable();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (adminModal.style.display === 'block') {
                    adminModal.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
                if (imageModal.style.display === 'flex') {
                    imageModal.style.display = 'none';
                }
            }
        });
        
        imageModal.addEventListener('click', () => {
            imageModal.style.display = 'none';
        });
        
        // Бетті жабу алдында ағындарды тоқтату
        window.addEventListener('beforeunload', () => {
            if (loginStream) {
                loginStream.getTracks().forEach(t => t.stop());
            }
            stopClapDetection();
        });
        
    })();
</script>
