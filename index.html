<script>
(function(){
  "use strict";

  function badKey(e){
    const k = (e.key || "").toUpperCase();
    if (
      e.key === "F12" ||
      (e.ctrlKey && k === "U") ||
      (e.ctrlKey && k === "S") ||
      (e.ctrlKey && k === "P") ||
      (e.ctrlKey && k === "C" && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) ||
      (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(k))
    ) {
      e.preventDefault();
      e.stopPropagation();
      alert("Бұл сайт қорғалған!");
      return false;
    }
  }

  document.addEventListener("contextmenu", e => e.preventDefault(), true);
  document.addEventListener("selectstart", e => {
    if (!["INPUT","TEXTAREA"].includes((e.target.tagName || "").toUpperCase())) {
      e.preventDefault();
    }
  }, true);
  document.addEventListener("copy", e => {
    if (!["INPUT","TEXTAREA"].includes((e.target.tagName || "").toUpperCase())) {
      e.preventDefault();
    }
  }, true);
  document.addEventListener("cut", e => e.preventDefault(), true);
  document.addEventListener("keydown", badKey, true);

  function guard(open) {
    let el = document.getElementById("devGuard");
    if (!el) {
      el = document.createElement("div");
      el.id = "devGuard";
      el.innerHTML = "<div><b>Сайт қорғалған</b><br><small>Developer tools жабылғаннан кейін жалғастырыңыз.</small></div>";
      document.documentElement.appendChild(el);
    }
    el.style.display = open ? "flex" : "none";
  }

  setInterval(function(){
    const opened = Math.abs(window.outerWidth - window.innerWidth) > 180 ||
                   Math.abs(window.outerHeight - window.innerHeight) > 180;
    guard(opened);
  }, 900);
})();
</script>

// === ЖАРЫС ЖҮЙЕСІ ===
let currentRoom = localStorage.getItem("currentRoom") || null;
let currentUserId = localStorage.getItem("currentUserId") || null;

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
  let code = '';
  for(let i=0; i<6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function getPlayerName() {
  const nameInput = document.getElementById("playerNameInput");
  let name = nameInput.value.trim();
  if(!name) {
    name = "Қатысушы";
  }
  // Атын localStorage-ке сақтау
  localStorage.setItem("playerName", name);
  return name;
}

function createRoom() {
  const playerName = getPlayerName();
  if(!playerName || playerName === "Қатысушы") {
    const customName = prompt("👤 Жарысқа қатысу үшін атыңызды енгізіңіз:", "");
    if(customName && customName.trim()) {
      document.getElementById("playerNameInput").value = customName.trim();
      localStorage.setItem("playerName", customName.trim());
    } else {
      alert("⚠️ Атыңызды енгізу міндетті!");
      return;
    }
  }
  
  const code = generateRoomCode();
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  
  // Жаңа бөлме құру
  rooms[code] = {
    createdAt: new Date().toISOString(),
    participants: [],
    host: playerName
  };
  
  localStorage.setItem(ROOMS_STORE, JSON.stringify(rooms));
  currentRoom = code;
  localStorage.setItem("currentRoom", code);
  
  // Қатысушыны қосу
  addUserToRoom(playerName);
  
  // Лидербордты көрсету
  document.getElementById("leaderboardContainer").style.display = "block";
  showLeaderboard();
  showShareModal(code);
  
  return code;
}

function joinRoom(code) {
  const playerName = getPlayerName();
  if(!playerName || playerName === "Қатысушы") {
    const customName = prompt("👤 Жарысқа қатысу үшін атыңызды енгізіңіз:", "");
    if(customName && customName.trim()) {
      document.getElementById("playerNameInput").value = customName.trim();
      localStorage.setItem("playerName", customName.trim());
    } else {
      alert("⚠️ Атыңызды енгізу міндетті!");
      return false;
    }
  }
  
  code = code.toUpperCase().trim();
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  
  if(!rooms[code]) {
    alert("❌ Бөлме табылмады! Кодты тексеріңіз.");
    return false;
  }
  
  currentRoom = code;
  localStorage.setItem("currentRoom", code);
  
  // Қатысушыны қосу
  addUserToRoom(playerName);
  
  // Лидербордты көрсету
  document.getElementById("leaderboardContainer").style.display = "block";
  showLeaderboard();
  
  alert(`✅ "${code}" бөлмесіне қосылдыңыз! Енді тесті бастаңыз.`);
  return true;
}

function addUserToRoom(playerName) {
  if(!currentRoom) return;
  
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  
  if(rooms[currentRoom]) {
    // Жаңа ID генерациялау (егер жоқ болса)
    if(!currentUserId) {
      currentUserId = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
      localStorage.setItem("currentUserId", currentUserId);
    }
    
    // Бұрыннан бар ма тексеру
    const existingIndex = rooms[currentRoom].participants.findIndex(p => p.id === currentUserId);
    
    if(existingIndex >= 0) {
      // Атын жаңарту
      rooms[currentRoom].participants[existingIndex].name = playerName;
    } else {
      // Жаңа қатысушы қосу
      rooms[currentRoom].participants.push({
        id: currentUserId,
        name: playerName,
        correct: 0,
        wrong: 0,
        completed: false,
        joinedAt: new Date().toISOString()
      });
    }
    
    localStorage.setItem(ROOMS_STORE, JSON.stringify(rooms));
    console.log(`✅ Қатысушы қосылды: ${playerName} → бөлме: ${currentRoom}`);
  }
}

function updateUserResultInRoom(correct, wrong) {
  if(!currentRoom || !currentUserId) return;
  
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  
  if(rooms[currentRoom]) {
    const participant = rooms[currentRoom].participants.find(p => p.id === currentUserId);
    
    if(participant) {
      participant.correct = correct;
      participant.wrong = wrong;
      participant.completed = true;
      participant.completedAt = new Date().toISOString();
      
      localStorage.setItem(ROOMS_STORE, JSON.stringify(rooms));
      console.log(`📊 Нәтиже жаңартылды: ${participant.name} - ${correct} дұрыс, ${wrong} қате`);
      
      // Лидербордты жаңарту
      showLeaderboard();
    } else {
      console.warn("⚠️ Қатысушы табылмады!");
    }
  }
}

function showLeaderboard() {
  if(!currentRoom) return;
  
  const rooms = JSON.parse(localStorage.getItem(ROOMS_STORE) || "{}");
  const room = rooms[currentRoom];
  
  if(!room) {
    console.warn("⚠️ Бөлме табылмады:", currentRoom);
    return;
  }
  
  // Дұрыс жауап саны бойынша сұрыптау (көптен азға), қате саны бойынша (аздан көпке)
  const sorted = [...room.participants].sort((a, b) => {
    if(b.correct !== a.correct) return b.correct - a.correct;
    return a.wrong - b.wrong;
  });
  
  const tbody = document.getElementById("leaderboardBody");
  
  if(sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Әзірге қатысушы жоқ</td></tr>';
  } else {
    tbody.innerHTML = sorted.map((p, idx) => {
      let rankClass = "";
      let rankEmoji = "";
      if(idx === 0) { rankClass = "rank1"; rankEmoji = "🥇"; }
      else if(idx === 1) { rankClass = "rank2"; rankEmoji = "🥈"; }
      else if(idx === 2) { rankClass = "rank3"; rankEmoji = "🥉"; }
      
      const percent = p.correct > 0 ? ((p.correct / Q.length) * 100).toFixed(1) : "0.0";
      const statusIcon = p.completed ? "✅" : "⏳";
      
      return `<tr class="${rankClass}">
        <td>${rankEmoji} ${idx+1}</td>
        <td>${statusIcon} ${p.name}</td>
        <td style="color:#00c853; font-weight:bold;">${p.correct}</td>
        <td style="color:#ff4141;">${p.wrong}</td>
        <td>${percent}%</td>
      </tr>`;
    }).join("");
  }
  
  // Бөлме ақпаратын көрсету
  document.getElementById("roomInfoDisplay").innerHTML = `
    <div class="room-code-badge">🏠 Бөлме: ${currentRoom}</div>
    <span style="color:#ffd700;">👥 ${room.participants.length} қатысушы</span>
    <button id="copyRoomCode" class="share-btn copy-btn">📋 Кодты көшіру</button>
  `;
  
  // Көшіру батырмасы
  const copyBtn = document.getElementById("copyRoomCode");
  if(copyBtn) {
    copyBtn.onclick = () => { 
      navigator.clipboard.writeText(currentRoom); 
      alert("✅ Бөлме коды көшірілді: " + currentRoom); 
    };
  }
  
  console.log(`📊 Лидерборд жаңартылды: ${sorted.length} қатысушы`);
}

function showShareModal(code) {
  // Бұрынғы модальды өшіру
  const oldModal = document.getElementById("shareModal");
  if(oldModal) oldModal.remove();
  
  const link = window.location.href.split('?')[0] + "?room=" + code;
  const modalHtml = `
    <div id="shareModal" style="position:fixed; inset:0; z-index:5000; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.95);">
      <div style="background:#1a0000; border:2px solid #ff2020; border-radius:24px; padding:30px; max-width:450px; text-align:center;">
        <h2 style="color:#ff2020; margin-bottom:20px;">🎉 Бөлме құрылды!</h2>
        <p style="color:#ffd700; margin-bottom:10px;">Достарыңызға осы кодты беріңіз:</p>
        <div style="font-size:2.5rem; font-weight:bold; background:#000; padding:20px; border-radius:12px; letter-spacing:8px; color:#ffd700; border:2px solid #ffd700;">${code}</div>
        <p style="margin:20px 0 10px; color:#ffc4c4;">Немесе сілтемені жіберіңіз:</p>
        <input type="text" id="shareLinkInput" value="${link}" style="width:100%; padding:12px; background:#220000; border:1px solid #ff2020; border-radius:8px; color:white; text-align:center;" readonly>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button id="copyLinkBtn" style="flex:1; background:#d00000; border:0; padding:12px; border-radius:8px; color:white; cursor:pointer; font-weight:bold;">📋 Көшіру</button>
          <button id="closeModalBtn" style="flex:1; background:#333; border:0; padding:12px; border-radius:8px; color:white; cursor:pointer;">Жабу</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  
  document.getElementById("copyLinkBtn").onclick = () => {
    const input = document.getElementById("shareLinkInput");
    input.select(); 
    document.execCommand("copy");
    alert("✅ Сілтеме көшірілді!");
  };
  
  document.getElementById("closeModalBtn").onclick = () => {
    document.getElementById("shareModal").remove();
  };
}

// === НЕГІЗГІ ТЕСТ ЛОГИКАСЫ ===
let idx = 0, done = false, user = null, stream = null, modelLoaded = false, faceOk = false;
let userAnswers = Array(Q.length).fill(null);
let userCorrect = Array(Q.length).fill(false);

const $ = id => document.getElementById(id);
const video = $("loginVideo"), statusDiv = $("status");
const cameraBtn = $("cameraBtn"), faceBtn = $("faceBtn"), loginBtn = $("loginBtn");

function setStatus(t, c) { statusDiv.textContent = t; statusDiv.className = "status " + c; }

async function loadModels() {
  try {
    setStatus("⏳ Модель жүктелуде...", "wait");
    const url = "https://justadudewhohacks.github.io/face-api.js/models";
    if (!window.faceapi) throw new Error("face-api жүктелмеді");
    await faceapi.nets.tinyFaceDetector.loadFromUri(url);
    await faceapi.nets.faceLandmark68Net.loadFromUri(url);
    modelLoaded = true;
    setStatus("✅ Дайын. Камераны қосыңыз", "ok");
  } catch(e) { setStatus("❌ Қате: " + e.message, "err"); }
}
window.addEventListener("load", loadModels);

cameraBtn.onclick = async () => {
  try {
    if(stream) stream.getTracks().forEach(t => t.stop());
    setStatus("📷 Камера сұралуда...", "wait");
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } });
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = () => { video.play(); res(); }; });
    setStatus("📷 Камера дайын", "ok");
    faceBtn.disabled = false;
    cameraBtn.disabled = true;
  } catch(e) { setStatus("❌ Камера рұқсаты жоқ", "err"); }
};

faceBtn.onclick = async () => {
  if(!modelLoaded) { setStatus("Модель жүктелуде...", "wait"); return; }
  setStatus("🔍 Бет ізделуде...", "wait");
  try {
    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
    if(detections.length === 0) throw new Error("Бет табылмады");
    if(detections.length > 1) throw new Error("Бірнеше бет");
    const box = detections[0].detection.box;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const x = Math.max(0, box.x - 40);
    const y = Math.max(0, box.y - 40);
    const w = Math.min(box.width + 80, video.videoWidth - x);
    const h = Math.min(box.height + 80, video.videoHeight - y);
    canvas.width = 200; canvas.height = 200;
    ctx.drawImage(video, x, y, w, h, 0, 0, 200, 200);
    const faceData = canvas.toDataURL("image/jpeg", 0.9);
    localStorage.setItem("userFace", faceData);
    faceOk = true;
    $("faceImg").src = faceData;
    $("preview").style.display = "block";
    setStatus("✅ Бет танылды!", "ok");
    loginBtn.disabled = false;
    if(stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
  } catch(e) { setStatus("❌ " + e.message, "err"); }
};

loginBtn.onclick = () => {
  if(!faceOk) { alert("Алдымен бетіңізді танытыңыз"); return; }
  if($("loginPass").value.trim() !== LOGIN_PASSWORD) { alert("Қате пароль! 2510 енгізіңіз"); return; }
  
  // Егер бөлмеге қосылған болса, лидербордты көрсету
  if(currentRoom) {
    document.getElementById("leaderboardContainer").style.display = "block";
    showLeaderboard();
  }
  
  $("loginScreen").classList.add("hidden");
  $("main").classList.add("visible");
  render();
  updateStatsDisplay();
};

function render() {
  if(done) return;
  const q = Q[idx];
  const selected = userAnswers[idx];
  let html = `<div class="card"><div class="qtext">${idx+1}. ${q[0]}</div><div class="opts">`;
  q[1].forEach((opt, i) => {
    let cls = "opt";
    if(selected !== null) {
      if(i === q[2]) cls += " correct";
      else if(i === selected) cls += " wrong";
      cls += " disabled";
    }
    html += `<div class="${cls}" data-i="${i}">${opt}</div>`;
  });
  html += `</div></div>`;
  $("test").innerHTML = html;
  if(selected === null) {
    document.querySelectorAll(".opt").forEach(el => {
      el.onclick = () => selectAnswer(+el.dataset.i);
    });
  }
  $("now").innerText = idx+1;
  $("total").innerText = Q.length;
  $("prev").disabled = idx === 0;
  $("next").disabled = idx === Q.length-1;
}

function selectAnswer(choice) {
  if(userAnswers[idx] !== null) return;
  userAnswers[idx] = choice;
  userCorrect[idx] = (choice === Q[idx][2]);
  render();
  updateStatsDisplay();
  if(idx < Q.length-1) {
    setTimeout(() => { idx++; render(); }, 300);
  }
}

function updateStatsDisplay() {
  const correctCount = userCorrect.filter(Boolean).length;
  const wrongCount = userAnswers.filter((a,i) => a !== null && !userCorrect[i]).length;
  $("correct").innerText = correctCount;
  $("wrong").innerText = wrongCount;
}

function saveResult() {
  const correctCount = userCorrect.filter(Boolean).length;
  const wrongCount = userAnswers.filter((a,i) => a !== null && !userCorrect[i]).length;
  const allResults = JSON.parse(localStorage.getItem(STORE) || "[]");
  allResults.push({
    id: Date.now() + "_" + Math.random().toString(36).slice(2,8),
    face: localStorage.getItem("userFace") || "",
    correct: correctCount,
    wrong: wrongCount,
    total: Q.length,
    room: currentRoom || "Жеке",
    date: new Date().toLocaleString()
  });
  localStorage.setItem(STORE, JSON.stringify(allResults));
  
  // Жарыс нәтижесін жаңарту
  if(currentRoom) {
    updateUserResultInRoom(correctCount, wrongCount);
  }
}

function finishTest() {
  done = true;
  saveResult();
  const correctCount = userCorrect.filter(Boolean).length;
  const wrongCount = userAnswers.filter((a,i) => a !== null && !userCorrect[i]).length;
  $("test").classList.add("hidden");
  $("nav").classList.add("hidden");
  $("result").classList.remove("hidden");
  $("result").innerHTML = `<div class="result"><h2>📊 НӘТИЖЕ</h2><div style="font-size:5rem;color:#ff2020;">${correctCount}</div><p>${Q.length} сұрақтың ішінен</p><div style="display:flex;gap:30px;justify-content:center;margin:20px 0"><div>✅ Дұрыс: ${correctCount}</div><div>❌ Қате: ${wrongCount}</div></div><button class="restart" onclick="location.reload()">🔄 Қайта бастау</button></div>`;
  
  // Лидербордты соңғы рет жаңарту
  if(currentRoom) {
    setTimeout(() => showLeaderboard(), 500);
  }
}

$("prev").onclick = () => { if(idx > 0) { idx--; render(); } };
$("next").onclick = () => { if(idx < Q.length-1) { idx++; render(); } };
$("finish").onclick = finishTest;

const adminModal = $("adminModal"), imgModal = $("imgModal"), bigImg = $("bigImg");

function loadAdminTable() {
  const all = JSON.parse(localStorage.getItem(STORE) || "[]");
  const tbody = $("tbody");
  $("countUsers").innerText = all.length;
  if(!all.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Нәтиже жоқ</td></tr>'; return; }
  tbody.innerHTML = all.reverse().map((r,i) => `<tr><td>${i+1}</td><td class="face-cell" data-face="${r.face || ''}">${r.face ? '<img src="'+r.face+'" class="thumb">' : '📷'}</td><td style="color:#00c853">${r.correct}</td><td style="color:#ff4141">${r.wrong}</td><td>${r.room || 'Жеке'}</td><td>${r.date}</td><td><button class="del" data-id="${r.id}">Жою</button></td></tr>`).join("");
  document.querySelectorAll(".face-cell").forEach(td => { td.onclick = () => { if(td.dataset.face) { bigImg.src = td.dataset.face; imgModal.style.display = "flex"; } }; });
  document.querySelectorAll(".del").forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); if(confirm("Жою?")) { let items = JSON.parse(localStorage.getItem(STORE) || "[]").filter(x => x.id !== btn.dataset.id); localStorage.setItem(STORE, JSON.stringify(items)); loadAdminTable(); } }; });
}
$("clearAll").onclick = () => { if(confirm("Барлық нәтижелерді жою?")) { localStorage.removeItem(STORE); loadAdminTable(); } };
imgModal.onclick = () => { imgModal.style.display = "none"; };
