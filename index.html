<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UNSIZ · ТЕСТ 100 · ТҮР + ПАРОЛЬ</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e14;
            color: #eef2fb;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px 16px;
            line-height: 1.5;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e14;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .login-screen.hidden { display: none !important; }
        .login-card {
            max-width: 520px;
            width: 100%;
            background: #111a24;
            border: 2px solid #cc0000;
            border-radius: 32px;
            padding: 36px 28px;
            box-shadow: 0 20px 0 #05080c;
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h2 { font-size: 2.8rem; font-weight: 900; text-transform: uppercase; color: white; }
        .red-block { color: #cc0000; }
        .login-sub { color: #8a9ab0; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; margin-top: 8px; }
        .face-section { margin-bottom: 28px; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 12px;
            border: 2px solid #cc0000;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }
        #loginVideo { width: 100%; height: auto; display: block; }
        #loginCanvas { display: none; }
        .face-status-login { text-align: center; padding: 10px; margin: 10px 0; border-radius: 8px; font-size: 0.9rem; }
        .login-btn {
            width: 100%;
            background: transparent;
            border: 2px solid #cc0000;
            color: white;
            font-weight: 700;
            padding: 14px;
            margin-top: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .login-btn:hover { background: #cc0000; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .password-group { margin-top: 20px; }
        .password-group input {
            width: 100%;
            padding: 16px;
            background: #0a0e14;
            border: 1px solid #3a4a5e;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 12px;
        }
        .main-site { display: none; }
        .main-site.visible { display: block; }
        
        .test-header {
            border-left: 6px solid #cc0000;
            padding-left: 24px;
            margin-bottom: 30px;
        }
        .test-header h1 { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; }
        .progress-panel {
            background: #151b23;
            border: 1px solid #2a3340;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .stats { display: flex; gap: 32px; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { text-transform: uppercase; font-size: 0.75rem; color: #8e9aaf; }
        .stat-value { font-size: 2.8rem; font-weight: 800; color: white; }
        .badge { background: #cc0000; padding: 8px 20px; border-radius: 40px; font-weight: 700; }
        .question-card {
            background: #10161d;
            border: 1px solid #26303d;
            border-radius: 28px;
            padding: 28px 24px;
            margin-bottom: 24px;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 2px dashed #2e3b4b;
        }
        .options-grid { display: flex; flex-direction: column; gap: 14px; }
        .option {
            background: #1a232e;
            border: 2px solid #2a3645;
            border-radius: 18px;
            padding: 18px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            color: #ddd;
        }
        .option:hover { background: #222f3d; border-color: #cc0000; }
        .option.correct { background: #0f3a1f; border-color: #00c853; color: white; }
        .option.wrong { background: #3a1515; border-color: #ff3b3b; color: #ffb0b0; }
        .option.disabled { pointer-events: none; opacity: 0.8; }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 24px 0 40px;
        }
        .nav-btn {
            background: #1e293b;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }
        .nav-btn:hover { background: #cc0000; }
        .finish-btn { background: #cc0000; }
        .result-screen {
            background: #10161d;
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            border: 2px solid #cc0000;
        }
        .result-screen h2 { font-size: 3rem; margin-bottom: 20px; }
        .restart-btn {
            background: #cc0000;
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 1.2rem;
            border-radius: 40px;
            margin-top: 30px;
            cursor: pointer;
        }
        
        .admin-link {
            position: fixed;
            bottom: 20px; right: 20px;
            background: #1a1a1a;
            color: #888;
            padding: 10px 18px;
            border: 1px solid #333;
            cursor: pointer;
            z-index: 1500;
            text-transform: uppercase;
        }
        .admin-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 3000;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .admin-content {
            max-width: 1200px;
            margin: 0 auto;
            background: #111;
            padding: 30px;
            border: 1px solid #cc0000;
        }
        .votes-table { width: 100%; border-collapse: collapse; color: white; }
        .votes-table th { background: #1a1a1a; padding: 10px; color: #cc0000; }
        .votes-table td { padding: 10px; border-bottom: 1px solid #222; }
        .delete-btn { background: #cc0000; color: white; border: none; padding: 5px 12px; cursor: pointer; }
        .hidden { display: none !important; }
        .info { background: #1a1a2a; color: #00aaff; }
        .success { background: #1a3a1a; color: #00ff00; }
        .error { background: #3a1a1a; color: #ff0000; }
        .waiting { background: #1a1a3a; color: #ffaa00; }
    </style>
</head>
<body>

<!-- КІРУ ЭКРАНЫ -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="login-header">
            <h2><span class="red-block">ҮНСІЗДІК</span><br>ТЕСТ</h2>
            <div class="login-sub">ТҮР + 2510</div>
        </div>
        <div class="face-section">
            <div class="video-container">
                <video id="loginVideo" autoplay playsinline></video>
            </div>
            <canvas id="loginCanvas"></canvas>
            <div id="loginFaceStatus" class="face-status-login info">📷 Модель жүктелуде...</div>
            <button class="login-btn" id="startLoginCameraBtn">📷 КАМЕРАНЫ ҚОСУ</button>
            <button class="login-btn" id="captureLoginFaceBtn" disabled>🔍 БЕТТІ ТАНУ</button>
        </div>
        <div class="password-group">
            <input type="password" id="loginPassword" placeholder="ПАРОЛЬ (2510)" maxlength="10" autocomplete="off">
        </div>
        <button class="login-btn" id="finalLoginBtn" disabled style="background:#cc0000;">КІРУ</button>
        <p style="color:#888; margin-top:16px; text-align:center; font-size:0.8rem;">Бет танытып, 2510 паролін енгізіңіз</p>
    </div>
</div>

<!-- НЕГІЗГІ САЙТ -->
<div class="main-site" id="mainSite">
    <div class="container">
        <div class="test-header">
            <h1><span class="red-block">ҚАТЕМЕН ЖҰМЫС</span><br>100 СҰРАҚ</h1>
        </div>
        <div class="progress-panel">
            <div class="stats">
                <div class="stat-item"><span class="stat-label">ДҰРЫС</span><span class="stat-value" id="correctCount">0</span></div>
                <div class="stat-item"><span class="stat-label">ҚАТЕ</span><span class="stat-value" id="wrongCount">0</span></div>
            </div>
            <div class="badge"><span id="currentQuestionDisplay">1</span>/100</div>
        </div>
        <div id="testArea"></div>
        <div id="resultArea" class="hidden"></div>
        <div class="nav-buttons" id="navButtons">
            <button class="nav-btn" id="prevBtn" disabled>◀ АЛДЫҢҒЫ</button>
            <button class="nav-btn" id="nextBtn">КЕЛЕСІ ▶</button>
            <button class="nav-btn finish-btn" id="finishBtn">ТЕСТТІ АЯҚТАУ</button>
        </div>
    </div>
</div>

<!-- АДМИН -->
<div class="admin-link" id="showAdminBtn">● АДМИН</div>
<div class="admin-modal" id="adminModal">
    <div class="admin-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2 style="color:#cc0000;">АДМИН</h2>
            <span style="font-size:30px; cursor:pointer;" id="closeAdminBtn">&times;</span>
        </div>
        <div id="adminPasswordScreen">
            <input type="password" id="adminPass" placeholder="Құпия сөз" style="padding:12px; background:#000; color:#fff; border:1px solid #444;">
            <button id="adminLoginBtn" style="background:#cc0000; padding:12px 24px;">КІРУ</button>
            <div id="adminError" style="color:red;"></div>
        </div>
        <div id="adminPanelContent" class="hidden">
            <div style="margin-bottom:20px;"><strong>БАРЛЫҚ НӘТИЖЕЛЕР: <span id="adminTotalUsers">0</span></strong></div>
            <button id="clearAllResultsBtn" style="background:#550000; color:white; padding:10px; margin-bottom:15px;">БАРЛЫҒЫН ЖОЮ</button>
            <table class="votes-table">
                <thead><tr><th>#</th><th>Аты</th><th>Түр</th><th>Дұрыс</th><th>Қате</th><th>Уақыт</th><th>Әрекет</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";
        
        // ========== 100 СҰРАҚ ==========
        const QUESTIONS = [
            { q: "Кодтағы қателерді анықтау процесі қалай аталады?", options: ["Компиляция", "Дебаггинг", "Тестілеу", "Орындау", "Инсталляция"], correct: 1 },
            { q: "Синтаксистік қате дегеніміз не?", options: ["Логикалық қате", "Бағдарлама баяу жұмыс істеуі", "Жазылу ережесінің бұзылуы", "Дерекқор қатесі", "Дизайн қатесі"], correct: 2 },
            { q: "Логикалық қате кезінде:", options: ["Бағдарлама мүлде ашылмайды", "Қате нәтиже береді", "Компьютер өшеді", "Файл жойылады", "Желі үзіледі"], correct: 1 },
            { q: "Runtime error қашан пайда болады?", options: ["Код жазу кезінде", "Компиляция кезінде", "Орындау кезінде", "Жобалау кезінде", "Орнату кезінде"], correct: 2 },
            { q: "Debugger не үшін керек?", options: ["Код жазу", "Қате іздеу", "Сурет салу", "Файл сақтау", "Интернетке шығу"], correct: 1 },
            { q: "print() функциясы не үшін қолданылады?", options: ["Қате жою", "Мәлімет шығару", "Файл ашу", "Желіге қосылу", "Код жою"], correct: 1 },
            { q: "try-except блогы не үшін керек?", options: ["Цикл құру", "Шарт жазу", "Қателерді өңдеу", "Айнымалы құру", "Файл жою"], correct: 2 },
            { q: "IDE дегеніміз:", options: ["Операциялық жүйе", "Бағдарламалау ортасы", "Вирус", "Драйвер", "Сервер"], correct: 1 },
            { q: "Infinite loop дегеніміз:", options: ["Бір рет орындалатын цикл", "Шексіз цикл", "Қате код", "Айнымалы", "Функция"], correct: 1 },
            { q: "Null мәні дегеніміз:", options: ["0 саны", "Бос мән", "1 саны", "Теріс сан", "Символ"], correct: 1 },
            { q: "Логикалық қатені табудың ең тиімді жолы:", options: ["Компьютерді өшіру", "Кодты қайта көшіру", "Қадамдап орындау", "Интернетті тексеру", "Принтер қосу"], correct: 2 },
            { q: "Синтаксистік қате табылғанда:", options: ["Бағдарлама дұрыс жұмыс істейді", "Компиляция тоқтайды", "Нәтиже баяу шығады", "Файл ашылады", "Желі үзіледі"], correct: 1 },
            { q: "Айнымалы анықталмаса қандай қате шығады?", options: ["Type error", "Name error", "Index error", "Logic error", "Value error"], correct: 1 },
            { q: "Массив шегінен тыс элементке жүгінсек:", options: ["Name error", "Type error", "Index error", "Syntax error", "Key error"], correct: 2 },
            { q: "Type error қашан болады?", options: ["Қате атау жазылса", "Түрлер сәйкес келмесе", "Индекс дұрыс болмаса", "Цикл тоқтаса", "Файл жабылса"], correct: 1 },
            { q: "Қатені қайталамау үшін не істеу керек?", options: ["Кодты тестілеу", "Өшіру", "Компьютер ауыстыру", "Интернет қосу", "Бағдарламаны жасыру"], correct: 0 },
            { q: "assert командасы не үшін қолданылады?", options: ["Файл ашу", "Мәлімет басу", "Шартты тексеру", "Цикл жасау", "Айнымалы жою"], correct: 2 },
            { q: "Лог-файл не үшін керек?", options: ["Музыка сақтау", "Қате жазбаларын сақтау", "Видео көру", "Сурет салу", "Интернетке қосылу"], correct: 1 },
            { q: "Refactoring дегеніміз:", options: ["Кодты жою", "Код құрылымын жақсарту", "Қате қосу", "Файл форматтау", "Компьютер тазалау"], correct: 1 },
            { q: "Unit тестілеу не тексереді?", options: ["Бүкіл жүйені", "Бір модульді", "Серверді", "Интернетті", "Дизайнды"], correct: 1 },
            { q: "ValueError қашан пайда болады?", options: ["Айнымалы жоқ болса", "Мәлімет түрі сәйкес келмесе", "Дұрыс емес мән енгізілсе", "Индекс артық болса", "Файл табылмаса"], correct: 2 },
            { q: "FileNotFoundError қашан шығады?", options: ["Айнымалы жоқ болса", "Файл табылмаса", "Түр сәйкес келмесе", "Шарт қате болса", "Цикл тоқтаса"], correct: 1 },
            { q: "except блогы қай кезде орындалады?", options: ["Қате болмаса", "Қате пайда болса", "Әрқашан", "Цикл ішінде ғана", "Функция алдында"], correct: 1 },
            { q: "finally блогы:", options: ["Ешқашан орындалмайды", "Қате болса ғана орындалады", "Әрқашан орындалады", "Цикл жасайды", "Айнымалы құрады"], correct: 2 },
            { q: "Логикалық қателерді табу үшін:", options: ["Кодты талдау керек", "Компьютер ауыстыру керек", "Файлды жою керек", "Интернетті өшіру керек", "Принтер қосу керек"], correct: 0 },
            { q: "Breakpoint дегеніміз:", options: ["Қате түрі", "Бағдарламаны тоқтату нүктесі", "Айнымалы", "Цикл", "Файл"], correct: 1 },
            { q: "Stack trace нені көрсетеді?", options: ["Дизайнды", "Қате шыққан жолды", "Интернет жылдамдығын", "Файл өлшемін", "Процессор түрін"], correct: 1 },
            { q: "Тестілеудің мақсаты:", options: ["Қате табу", "Кодты жасыру", "Компьютерді өшіру", "Желі қосу", "Файлды көшіру"], correct: 0 },
            { q: "Қай қате бағдарлама тоқтауына әкелуі мүмкін?", options: ["Логикалық", "Runtime error", "Комментарий қатесі", "Дизайн қатесі", "Стиль қатесі"], correct: 1 },
            { q: "Debugging процесінің соңғы мақсаты:", options: ["Кодты жою", "Қатені түзету", "Файлды жабу", "Компьютерді өшіру", "Интернетке қосылу"], correct: 1 },
            { q: "SyntaxError қай кезде шығады?", options: ["Орындау кезінде", "Компиляция кезінде", "Интернет жоқ кезде", "Файл жабылғанда", "Цикл тоқтағанда"], correct: 1 },
            { q: "ZeroDivisionError қашан пайда болады?", options: ["0-ге бөлгенде", "Айнымалы жоқ болса", "Түр сәйкес келмесе", "Индекс артық болса", "Файл ашылмаса"], correct: 0 },
            { q: "Кодтағы комментарий не үшін керек?", options: ["Қате шығару", "Түсіндіру жазу", "Файл жою", "Айнымалы құру", "Цикл жасау"], correct: 1 },
            { q: "Қате табылғаннан кейін бірінші қадам:", options: ["Кодты өшіру", "Себебін анықтау", "Компьютерді өшіру", "Жаңа файл ашу", "Интернет қосу"], correct: 1 },
            { q: "while циклі тоқтамаса, бұл:", options: ["Syntax error", "Логикалық қате", "Type error", "Name error", "Value error"], correct: 1 },
            { q: "Функция дұрыс нәтиже бермесе:", options: ["Логикалық қате бар", "Компьютер бұзылған", "Интернет жоқ", "Файл ашылмаған", "Драйвер жоқ"], correct: 0 },
            { q: "IDE-де қызыл сызық нені білдіреді?", options: ["Дұрыс код", "Синтаксистік қате", "Интернет бар", "Файл сақталған", "Принтер қосылған"], correct: 1 },
            { q: "Exception дегеніміз:", options: ["Айнымалы", "Қате жағдай", "Цикл", "Функция", "Сервер"], correct: 1 },
            { q: "Кодты кішкене бөліктермен тексеру:", options: ["Инсталляция", "Модульдік тексеру", "Форматтау", "Архивтеу", "Дизайн"], correct: 1 },
            { q: "Қай әдіс қателерді азайтады?", options: ["Тестілеу", "Көшіру", "Өшіру", "Форматтамау", "Компьютер ауыстыру"], correct: 0 },
            { q: "KeyError қашан пайда болады?", options: ["Айнымалы жоқ болса", "Сөздікте жоқ кілт қолданылса", "0-ге бөлгенде", "Түр сәйкес келмесе", "Файл ашылмаса"], correct: 1 },
            { q: "ImportError дегеніміз:", options: ["Айнымалы қатесі", "Модуль жүктелмесе", "Индекс қатесі", "Логикалық қате", "Шарт қатесі"], correct: 1 },
            { q: "Кодты қайта қарау (code review) мақсаты:", options: ["Қате табу", "Файл жою", "Интернет қосу", "Компьютер өшіру", "Дизайн өзгерту"], correct: 0 },

        // ========== КҮЙ ==========

        // ========== FACE API ==========
        async function loadFaceAPI() {
            if (faceApiLoaded) return;
            try {
                loginFaceStatus.textContent = '⏳ Модель жүктелуде...';
                loginFaceStatus.className = 'face-status-login waiting';
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
                faceApiLoaded = true;
                loginFaceStatus.textContent = '✅ Дайын. Камераны қосыңыз';
                loginFaceStatus.className = 'face-status-login success';
            } catch(e) {
                console.error(e);
                loginFaceStatus.textContent = '❌ Модель жүктелмеді';
                loginFaceStatus.className = 'face-status-login error';
            }
        }
        loadFaceAPI();
        
        startLoginCam.addEventListener('click', async () => {
            try {
                if (loginStream) {
                    loginStream.getTracks().forEach(t => t.stop());
                }
                loginFaceStatus.textContent = '📷 Камера сұралуда...';
                loginFaceStatus.className = 'face-status-login waiting';
                
                loginStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                
                loginVideo.srcObject = loginStream;
                loginVideo.play();
                
                loginFaceStatus.textContent = '📷 Камера дайын. Бетті тануға болады';
                loginFaceStatus.className = 'face-status-login success';
                captureLoginFace.disabled = false;
            } catch(e) {
                console.error(e);
                loginFaceStatus.textContent = '❌ Камераға рұқсат берілмеді';
                loginFaceStatus.className = 'face-status-login error';
            }
        });
        
        captureLoginFace.addEventListener('click', async () => {
            if (!faceApiLoaded) {
                loginFaceStatus.textContent = '⏳ Модель әлі жүктелуде...';
                return;
            }
            if (!loginStream) {
                loginFaceStatus.textContent = '❌ Алдымен камераны қосыңыз';
                return;
            }
            
            loginFaceStatus.textContent = '🔍 Бет ізделуде...';
            loginFaceStatus.className = 'face-status-login waiting';
            
            try {
                const detections = await faceapi.detectAllFaces(
                    loginVideo, 
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks();
                
                if (detections.length === 0) {
                    throw new Error('Бет табылмады');
                }
                if (detections.length > 1) {
                    throw new Error('Бірнеше бет табылды');
                }
                
                const detection = detections[0];
                const score = detection.detection.score;
                if (score < 0.7) {
                    throw new Error('Бет анық көрінбейді');
                }
                
                const ctx = loginCanvas.getContext('2d');
                loginCanvas.width = loginVideo.videoWidth;
                loginCanvas.height = loginVideo.videoHeight;
                ctx.drawImage(loginVideo, 0, 0);
                
                // Бет аймағын қиып алу
                const box = detection.detection.box;
                const faceCanvas = document.createElement('canvas');
                faceCanvas.width = 200;
                faceCanvas.height = 200;
                const faceCtx = faceCanvas.getContext('2d');
                faceCtx.drawImage(loginVideo, box.x, box.y, box.width, box.height, 0, 0, 200, 200);
                
                loginFaceCaptured = faceCanvas.toDataURL('image/jpeg', 0.85);
                loginFaceDetected = true;
                
                loginFaceStatus.textContent = '✅ Бет танылды!';
                loginFaceStatus.className = 'face-status-login success';
                finalLoginBtn.disabled = false;
                
                if (loginStream) {
                    loginStream.getTracks().forEach(t => t.stop());
                    loginStream = null;
                }
                loginVideo.srcObject = null;
                
            } catch(e) {
                console.error(e);
                loginFaceStatus.textContent = '❌ ' + e.message;
                loginFaceStatus.className = 'face-status-login error';
            }
        });
        
        finalLoginBtn.addEventListener('click', () => {
            const pass = loginPassword.value.trim();
            if (!loginFaceDetected) { 
                alert('Алдымен бетіңізді танытыңыз'); 
                return; 
            }
            if (pass !== LOGIN_PASSWORD) { 
                alert('Қате пароль! 2510 енгізіңіз'); 
                return; 
            }
            
            currentUser = { 
                face: loginFaceCaptured, 
                name: 'Қолданушы' 
            };
            
            loginScreen.classList.add('hidden');
            mainSite.classList.add('visible');
            renderQuestion();
            updateStats();
        });
        
        // ========== ТЕСТ ==========
        function renderQuestion() {
            if (testFinished) return;
            const q = QUESTIONS[currentIndex];
            const selected = answers[currentIndex];
            
            let html = `<div class="question-card">
                <div class="question-text">${currentIndex+1}. ${q.q}</div>
                <div class="options-grid">`;
            
            q.options.forEach((opt, idx) => {
                let cls = 'option';
                if (selected !== null) {
                    if (idx === q.correct) cls += ' correct';
                    else if (idx === selected) cls += ' wrong';
                    cls += ' disabled';
                }
                html += `<div class="${cls}" data-opt="${idx}">${opt}</div>`;
            });
            
            html += '</div></div>';
            testArea.innerHTML = html;
            
            if (selected === null) {
                document.querySelectorAll('.option').forEach(el => {
                    el.addEventListener('click', () => selectAnswer(parseInt(el.dataset.opt)));
                });
            }
            
            currentQSpan.textContent = currentIndex + 1;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === 99;
        }
        
        function selectAnswer(optIdx) {
            if (answers[currentIndex] !== null) return;
            
            const q = QUESTIONS[currentIndex];
            const isCorrect = (optIdx === q.correct);
            
            answers[currentIndex] = optIdx;
            questionStatus[currentIndex] = isCorrect;
            
            renderQuestion();
            updateStats();
        }
        
        function updateStats() {
            const correct = questionStatus.filter(v => v === true).length;
            const wrong = answers.filter((a, i) => a !== null && !questionStatus[i]).length;
            correctSpan.textContent = correct;
            wrongSpan.textContent = wrong;
        }
        
        function saveResult() {
            if (!currentUser) return;
            
            const correct = questionStatus.filter(v => v === true).length;
            const wrong = answers.filter((a, i) => a !== null && !questionStatus[i]).length;
            
            const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const record = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                name: currentUser.name,
                face: currentUser.face,
                correct, 
                wrong, 
                total: 100,
                date: new Date().toLocaleString('kk-KZ')
            };
            results.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
        }
        
        function finishTest() {
            testFinished = true;
            saveResult();
            
            const correct = questionStatus.filter(v => v === true).length;
            const wrong = answers.filter((a, i) => a !== null && !questionStatus[i]).length;
            
            testArea.classList.add('hidden');
            navButtons.classList.add('hidden');
            resultArea.classList.remove('hidden');
            
            resultArea.innerHTML = `
                <div class="result-screen">
                    <h2>НӘТИЖЕ</h2>
                    <div style="font-size:4rem; color:#cc0000;">${correct} / 100</div>
                    <p style="font-size:1.3rem; margin:20px 0;">Дұрыс: ${correct} | Қате: ${wrong}</p>
                    <button class="restart-btn" onclick="location.reload()">ҚАЙТАДАН БАСТАУ</button>
                </div>
            `;
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentIndex < 99) {
                currentIndex++;
                renderQuestion();
            }
        });
        
        finishBtn.addEventListener('click', finishTest);

        const adminModal = document.getElementById('adminModal');
        
        document.getElementById('showAdminBtn').addEventListener('click', () => {
            adminModal.style.display = 'block';

        adminModal.addEventListener('click', (e) => {

        });
        
        document.getElementById('adminLoginBtn').addEventListener('click', () => {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('adminPasswordScreen').classList.add('hidden');
                document.getElementById('adminPanelContent').classList.remove('hidden');
                renderAdminTable();
            } else {
                document.getElementById('adminError').textContent = 'Қате құпия сөз';
            }
        });
        
        function renderAdminTable() {
            const results = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            document.getElementById('adminTotalUsers').textContent = results.length;
            
            const tbody = document.getElementById('adminTableBody');
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">Нәтиже жоқ</td></tr>';
                return;
            }
            
            tbody.innerHTML = results.reverse().map((r, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.name}</td>
                    <td><img src="${r.face}" width="40" style="border-radius:8px;"></td>
                    <td>${r.correct}</td>
                    <td>${r.wrong}</td>
                    <td>${r.date}</td>
                    <td><button class="delete-btn" data-id="${r.id}">ЖОЮ</button></td>
                </tr>
            `).join('');
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const filtered = results.filter(r => r.id !== id);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));
                    renderAdminTable();
                });
            });
        }
        
        document.getElementById('clearAllResultsBtn').addEventListener('click', () => {
            if (confirm('Барлық нәтижелерді жоюға сенімдісіз бе?')) {
                localStorage.removeItem(STORAGE_KEY);
                renderAdminTable();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && adminModal.style.display === 'block') {
                adminModal.style.display = 'none';
            }
        });
        
    })();
</script>
</body>
</html>
