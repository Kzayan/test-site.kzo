
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестілеу жүйесі</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            color: white;
        }
        
        /* Беттер */
        .page {
            display: none;
            min-height: 100vh;
        }
        
        .page.active {
            display: block;
        }
        
        /* Кіру беті */
        #page-login {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .pw-wrap {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .pw-wrap input {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            text-align: center;
        }
        
        .pw-wrap button {
            padding: 15px 25px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        /* Басты бет */
        .hero {
            text-align: center;
            padding: 50px 20px;
        }
        
        h1 {
            font-size: 48px;
            margin: 20px 0;
        }
        
        .test-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 40px 0;
        }
        
        button {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px);
        }
        
        .btn-errors {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-micro {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
        }
        
        .btn-test3 {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }
        
        .test-header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            display: flex;
            justify-content: space-between;
        }
        
        .question-card {
            background: white;
            color: #333;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            margin: 40px auto;
        }
        
        .options-grid {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }
        
        .opt {
            padding: 15px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        
        .result-card {
            background: white;
            color: #333;
            border-radius: 30px;
            padding: 50px;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- Кіру беті -->
<div id="page-login" class="page active">
    <div class="login-box">
        <h1>🔐 Тестке кіру</h1>
        <p>Паролді енгізіңіз (7777)</p>
        <div class="pw-wrap">
            <input type="password" id="pw-input" placeholder="****" maxlength="4">
            <button onclick="checkPassword()">Кіру</button>
        </div>
        <p id="pw-error" class="hidden">Қате пароль!</p>
    </div>
</div>

<!-- Басты бет -->
<div id="page-home" class="page">
    <div class="hero">
        <h1>📚 Тестілеу жүйесі</h1>
        <p>Үш түрлі тестіні тапсырыңыз</p>
        
        <!-- БАТЫРМАЛАР -->
        <div class="test-buttons">
            <button class="btn-errors" onclick="startErrorsTest()">📋 Қателер тесті</button>
            <button class="btn-micro" onclick="startMicroTest()">🔧 Микропроцессор</button>
            <button class="btn-test3" onclick="startTest3()">🗄️ 3 тест</button>
        </div>
    </div>
</div>

<!-- Тест беті -->
<div id="page-test" class="page">
    <div class="test-header">
        <span id="test-title">Тест</span>
        <span id="timer">30:00</span>
    </div>
    <div id="question-card" class="question-card">
        <h3 id="question-text">Сұрақ</h3>
        <div id="options" class="options-grid"></div>
    </div>
</div>

<!-- Нәтиже беті -->
<div id="page-result" class="page">
    <div class="result-card">
        <h2 id="result-title">Нәтиже</h2>
        <div id="result-score">0/0</div>
        <button onclick="goHome()">Басты бет</button>
    </div>
</div>

<script>
// Пароль тексеру
function checkPassword() {
    const input = document.getElementById('pw-input').value;
    if (input === '7777') {
        showPage('page-home');
    } else {
        document.getElementById('pw-error').classList.remove('hidden');
    }
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

// Тест функциялары
function startErrorsTest() {
    alert('Қателер тесті басталды!');
    showPage('page-test');
}

function startMicroTest() {
    alert('Микропроцессор тесті басталды!');
    showPage('page-test');
}

function startTest3() {
    alert('3 тест басталды!');
    showPage('page-test');
}

function goHome() {
    showPage('page-home');
}

// Бастапқы бет
showPage('page-login');
</script>

</body>
</html>
